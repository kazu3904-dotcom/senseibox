<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラス席替え・順番決め・グループ分け</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #f0f4f8;
        }

        /* アニメーション用クラス */
        .pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.9);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .chip-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.2s;
        }
        
        .chip-shadow:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* モード切替タブのアクティブ状態 */
        .tab-active {
            background-color: #2563eb; /* blue-600 */
            color: white;
            border-color: #2563eb;
        }
        .tab-inactive {
            background-color: white;
            color: #64748b; /* slate-500 */
            border-color: #e2e8f0; /* slate-200 */
        }
        .tab-inactive:hover {
            background-color: #f8fafc;
        }
        
        /* ボタンクリック時のエフェクト */
        .btn-press:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-700">

    <div class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
        
        <!-- ヘッダー -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 p-6 text-center">
            <h1 class="text-2xl md:text-3xl font-bold text-white tracking-wide">
                <i class="fa-solid fa-shuffle mr-2"></i>クラスくじ引き
            </h1>
            <p class="text-blue-100 text-sm mt-2">席替え・順番決め・グループ分けツール</p>
        </div>

        <div class="p-6 md:p-8">
            
            <!-- モード切替タブ -->
            <div class="flex justify-center gap-4 mb-8">
                <!-- グループ分けをデフォルト（左側・Active）に -->
                <button onclick="switchMode('group')" id="tab-group" 
                    class="tab-active px-6 py-3 rounded-full font-bold border-2 transition-all flex items-center gap-2 shadow-sm btn-press">
                    <i class="fa-solid fa-users-rectangle"></i> グループ分け
                </button>
                <button onclick="switchMode('order')" id="tab-order" 
                    class="tab-inactive px-6 py-3 rounded-full font-bold border-2 transition-all flex items-center gap-2 shadow-sm btn-press">
                    <i class="fa-solid fa-list-ol"></i> 順番決め
                </button>
            </div>

            <!-- コントロールエリア -->
            <div class="bg-slate-50 p-6 rounded-2xl mb-8 border border-slate-100">
                <div class="flex flex-col md:flex-row gap-8 justify-center items-start md:items-center">
                    
                    <!-- 人数設定エリア -->
                    <div class="w-full md:w-auto flex flex-col items-center md:items-start gap-2">
                        <label for="count" class="block text-sm font-bold text-slate-500 ml-1">全体の人数</label>
                        
                        <div class="flex items-center gap-2">
                            <button onclick="adjustCount(-1)" class="w-10 h-10 rounded-full bg-white border border-slate-300 text-slate-500 hover:bg-slate-100 font-bold btn-press shadow-sm" title="-1"><i class="fa-solid fa-minus"></i></button>
                            
                            <div class="relative inline-block w-28">
                                <input id="count" type="number" value="30" min="1" max="100" onchange="saveSettings()"
                                    class="w-full pl-2 pr-2 py-3 text-2xl font-bold text-center border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all text-slate-700 shadow-inner"
                                    placeholder="30">
                            </div>

                            <button onclick="adjustCount(1)" class="w-10 h-10 rounded-full bg-white border border-slate-300 text-slate-500 hover:bg-slate-100 font-bold btn-press shadow-sm" title="+1"><i class="fa-solid fa-plus"></i></button>
                        </div>

                        <!-- 補助ボタン -->
                        <div class="flex flex-wrap gap-1.5 justify-center md:justify-start mt-1 max-w-[200px]">
                            <!-- プリセット -->
                            <button onclick="setCount(10)" class="text-xs font-bold bg-slate-200 hover:bg-slate-300 text-slate-600 px-2.5 py-1.5 rounded-lg btn-press transition-colors">10</button>
                            <button onclick="setCount(20)" class="text-xs font-bold bg-slate-200 hover:bg-slate-300 text-slate-600 px-2.5 py-1.5 rounded-lg btn-press transition-colors">20</button>
                            <button onclick="setCount(30)" class="text-xs font-bold bg-slate-200 hover:bg-slate-300 text-slate-600 px-2.5 py-1.5 rounded-lg btn-press transition-colors">30</button>
                            <button onclick="setCount(40)" class="text-xs font-bold bg-slate-200 hover:bg-slate-300 text-slate-600 px-2.5 py-1.5 rounded-lg btn-press transition-colors">40</button>
                            <!-- 加算・減算 -->
                            <button onclick="adjustCount(-1)" class="text-xs font-bold bg-blue-100 hover:bg-blue-200 text-blue-700 px-2 py-1.5 rounded-lg btn-press transition-colors ml-1">-1</button>
                            <button onclick="adjustCount(1)" class="text-xs font-bold bg-blue-100 hover:bg-blue-200 text-blue-700 px-2 py-1.5 rounded-lg btn-press transition-colors">+1</button>
                            <button onclick="adjustCount(5)" class="text-xs font-bold bg-blue-100 hover:bg-blue-200 text-blue-700 px-2 py-1.5 rounded-lg btn-press transition-colors">+5</button>
                        </div>
                    </div>

                    <!-- グループ数設定（グループモードがデフォルトなので初期表示） -->
                    <div id="group-settings" class="w-full md:w-auto text-center md:text-left animate-fade-in">
                        <label for="group-count" class="block text-sm font-bold text-slate-500 mb-1 ml-1">グループ数</label>
                        <div class="relative inline-block w-full md:w-auto">
                            <i class="fa-solid fa-layer-group absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input id="group-count" type="number" value="6" min="1" max="50" onchange="saveSettings()"
                                class="pl-10 pr-4 py-3 w-32 text-xl font-bold text-center border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all text-slate-700"
                                placeholder="6">
                        </div>
                        <div class="flex gap-1 justify-center md:justify-start mt-2">
                             <button onclick="adjustGroupCount(-1)" class="w-8 h-8 rounded-lg bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 btn-press"><i class="fa-solid fa-minus text-xs"></i></button>
                             <button onclick="adjustGroupCount(1)" class="w-8 h-8 rounded-lg bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 btn-press"><i class="fa-solid fa-plus text-xs"></i></button>
                        </div>
                    </div>

                    <!-- スタート・リセットボタン -->
                    <div class="flex gap-2 w-full md:w-auto self-center md:self-center mt-2 md:mt-0">
                        <button onclick="startLottery()" id="startBtn"
                            class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-xl shadow-lg transform active:scale-95 transition-all flex items-center justify-center gap-2 min-w-[160px] text-lg">
                            <i class="fa-solid fa-play"></i> スタート
                        </button>
                        
                        <button onclick="resetView()" 
                            class="bg-white hover:bg-slate-100 text-slate-500 border-2 border-slate-200 font-bold py-4 px-5 rounded-xl transition-colors btn-press" title="リセット">
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- エラーメッセージ -->
            <div id="error-msg" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-r" role="alert">
                <p class="font-bold"><i class="fa-solid fa-triangle-exclamation mr-1"></i> 入力エラー</p>
                <p id="error-text">1以上の正しい人数を入力してください。</p>
            </div>

            <!-- ステータス表示 -->
            <div id="status-area" class="text-center mb-4 min-h-[1.5rem] font-bold text-indigo-500"></div>

            <!-- 結果表示エリア (グループモード用：デフォルト表示) -->
            <div id="result-grid-group" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                <!-- 初期状態 -->
                <div class="col-span-full text-center text-slate-400 py-12 dashed-border bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                    <i class="fa-solid fa-layer-group text-4xl mb-3 block opacity-20"></i>
                    ここに結果が表示されます
                </div>
            </div>

            <!-- 結果表示エリア (順番モード用：デフォルト非表示) -->
            <div id="result-grid-order" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 mb-6">
                <!-- Javascriptで生成 -->
            </div>

            <!-- テキストコピー用エリア -->
            <div id="copy-area" class="hidden">
                <div class="relative group">
                    <textarea id="result-text" readonly 
                        class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 text-slate-600 text-sm h-32 focus:outline-none resize-none mb-2 font-mono leading-relaxed"></textarea>
                    <button onclick="copyToClipboard()" 
                        class="absolute top-3 right-3 bg-white hover:bg-indigo-50 text-indigo-600 border border-indigo-200 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm transition-all flex items-center gap-1 opacity-80 group-hover:opacity-100">
                        <i class="fa-regular fa-copy"></i> テキストをコピー
                    </button>
                </div>
            </div>

        </div>
    </div>

<script>
    let currentMode = 'group'; // デフォルトを 'group' に変更
    let isAnimating = false;

    // --- 設定の保存・読み込み (LocalStorage) ---
    function loadSettings() {
        const savedCount = localStorage.getItem('lottery_count');
        const savedGroupCount = localStorage.getItem('lottery_group_count');
        
        if (savedCount) {
            document.getElementById('count').value = savedCount;
        }
        if (savedGroupCount) {
            document.getElementById('group-count').value = savedGroupCount;
        }
    }

    function saveSettings() {
        const count = document.getElementById('count').value;
        const groupCount = document.getElementById('group-count').value;
        localStorage.setItem('lottery_count', count);
        localStorage.setItem('lottery_group_count', groupCount);
    }

    // --- 人数調整用関数 ---
    function setCount(val) {
        document.getElementById('count').value = val;
        saveSettings();
    }

    function adjustCount(diff) {
        const input = document.getElementById('count');
        let val = parseInt(input.value || 0, 10);
        val += diff;
        if (val < 1) val = 1;
        input.value = val;
        saveSettings();
    }
    
    function adjustGroupCount(diff) {
        const input = document.getElementById('group-count');
        let val = parseInt(input.value || 0, 10);
        val += diff;
        if (val < 1) val = 1;
        input.value = val;
        saveSettings();
    }

    // ページ読み込み時に設定を復元
    window.addEventListener('DOMContentLoaded', () => {
        loadSettings();
    });


    // --- メインロジック ---

    // モード切替処理
    function switchMode(mode) {
        if(isAnimating) return;

        currentMode = mode;
        const tabOrder = document.getElementById('tab-order');
        const tabGroup = document.getElementById('tab-group');
        const groupSettings = document.getElementById('group-settings');
        const gridOrder = document.getElementById('result-grid-order');
        const gridGroup = document.getElementById('result-grid-group');
        
        // エラーと結果をリセット
        resetView();

        if (mode === 'group') {
            // スタイルの切り替え
            tabOrder.className = 'tab-inactive px-6 py-3 rounded-full font-bold border-2 transition-all flex items-center gap-2 shadow-sm cursor-pointer btn-press';
            tabGroup.className = 'tab-active px-6 py-3 rounded-full font-bold border-2 transition-all flex items-center gap-2 shadow-sm btn-press';
            
            // 表示エリアの切り替え
            groupSettings.classList.remove('hidden');
            gridOrder.classList.add('hidden');
            gridGroup.classList.remove('hidden');
        } else {
            tabOrder.className = 'tab-active px-6 py-3 rounded-full font-bold border-2 transition-all flex items-center gap-2 shadow-sm btn-press';
            tabGroup.className = 'tab-inactive px-6 py-3 rounded-full font-bold border-2 transition-all flex items-center gap-2 shadow-sm cursor-pointer btn-press';
            
            groupSettings.classList.add('hidden');
            gridOrder.classList.remove('hidden');
            gridGroup.classList.add('hidden');
        }
    }

    // 配列をシャッフルする関数
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function startLottery() {
        if (isAnimating) return;

        // スタート時に設定を保存しておく
        saveSettings();

        const countInput = document.getElementById("count");
        const groupCountInput = document.getElementById("group-count");
        
        const n = parseInt(countInput.value, 10);
        const g = parseInt(groupCountInput.value, 10);
        
        const errorMsg = document.getElementById("error-msg");
        const errorText = document.getElementById("error-text");
        const copyArea = document.getElementById("copy-area");
        const resultText = document.getElementById("result-text");
        const statusArea = document.getElementById("status-area");
        const startBtn = document.getElementById("startBtn");

        // バリデーション
        if (!Number.isFinite(n) || n < 1) {
            errorText.textContent = "人数を正しく入力してください（1以上）。";
            errorMsg.classList.remove("hidden");
            return;
        }

        if (currentMode === 'group') {
            if (!Number.isFinite(g) || g < 1) {
                errorText.textContent = "グループ数を正しく入力してください（1以上）。";
                errorMsg.classList.remove("hidden");
                return;
            }
            if (g > n) {
                errorText.textContent = "グループ数は全体の人数以下にしてください。";
                errorMsg.classList.remove("hidden");
                return;
            }
        }

        errorMsg.classList.add("hidden");
        copyArea.classList.add("hidden");
        
        // UI初期化
        const gridOrder = document.getElementById("result-grid-order");
        const gridGroup = document.getElementById("result-grid-group");
        gridOrder.innerHTML = "";
        gridGroup.innerHTML = "";

        isAnimating = true;
        startBtn.classList.add("opacity-50", "cursor-not-allowed");
        startBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 抽選中...';

        // 配列生成とシャッフル
        const nums = Array.from({length: n}, (_, i) => i + 1);
        shuffle(nums);

        if (currentMode === 'order') {
            await runOrderMode(n, nums, gridOrder, statusArea, resultText);
        } else {
            await runGroupMode(n, g, nums, gridGroup, statusArea, resultText);
        }

        // 完了処理
        statusArea.textContent = "抽選完了！";
        copyArea.classList.remove("hidden");
        isAnimating = false;
        startBtn.classList.remove("opacity-50", "cursor-not-allowed");
        startBtn.innerHTML = '<i class="fa-solid fa-play"></i> スタート';
    }

    // 順番決めモードの処理
    async function runOrderMode(n, nums, grid, statusArea, resultText) {
        resultText.value = nums.map((num, idx) => `${idx + 1}番目: ${num}番`).join('\n');
        
        const delay = n > 30 ? 30 : 60;
        statusArea.textContent = "順番を決めています...";

        for (let i = 0; i < n; i++) {
            const num = nums[i];
            const order = i + 1;

            const card = document.createElement("div");
            card.className = "pop-in chip-shadow bg-white border border-indigo-100 rounded-lg p-3 flex items-center justify-between";
            
            let rankBadgeClass = "bg-slate-100 text-slate-500";
            let icon = "";
            if (order === 1) {
                rankBadgeClass = "bg-yellow-100 text-yellow-700 font-bold border border-yellow-200";
                icon = '<i class="fa-solid fa-crown text-yellow-400 ml-1 text-xs"></i>';
            } else if (order === 2) {
                rankBadgeClass = "bg-gray-100 text-gray-700 font-bold border border-gray-200";
            } else if (order === 3) {
                rankBadgeClass = "bg-orange-50 text-orange-700 font-bold border border-orange-200";
            }

            card.innerHTML = `
                <div class="flex flex-col items-start">
                    <span class="text-xs ${rankBadgeClass} px-2 py-0.5 rounded-full mb-1">
                        ${order}番目${icon}
                    </span>
                </div>
                <div class="text-2xl font-bold text-indigo-600 font-mono">
                    ${num}
                </div>
            `;
            
            grid.appendChild(card);
            await sleep(delay);
        }
    }

    // グループ分けモードの処理
    async function runGroupMode(n, g, nums, grid, statusArea, resultText) {
        // グループコンテナを作成
        const groups = Array.from({length: g}, () => []);
        
        // 振り分け (Round Robin)
        nums.forEach((num, index) => {
            groups[index % g].push(num);
        });

        // テキスト生成
        let textResult = "";
        groups.forEach((group, idx) => {
            // ソートして見やすくする（オプション）
            const sortedGroup = [...group].sort((a,b) => a-b);
            textResult += `【グループ${idx + 1}】: ${sortedGroup.join(', ')}\n`;
        });
        resultText.value = textResult;

        statusArea.textContent = "グループに振り分けています...";
        
        // グループ枠を先に描画
        const groupElements = [];
        for(let i = 0; i < g; i++) {
            const groupCard = document.createElement("div");
            groupCard.className = "pop-in bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden flex flex-col h-full";
            
            // ヘッダーの色をローテーション
            const colors = ['bg-blue-500', 'bg-emerald-500', 'bg-orange-500', 'bg-rose-500', 'bg-purple-500', 'bg-cyan-500'];
            const headerColor = colors[i % colors.length];

            groupCard.innerHTML = `
                <div class="${headerColor} text-white px-4 py-2 font-bold flex justify-between items-center">
                    <span>グループ ${i + 1}</span>
                    <span class="text-xs bg-white/20 px-2 py-0.5 rounded-full">${groups[i].length}名</span>
                </div>
                <div class="p-4 flex-1 bg-slate-50/50">
                    <div class="flex flex-wrap gap-2 justify-center" id="group-content-${i}"></div>
                </div>
            `;
            grid.appendChild(groupCard);
            groupElements.push(document.getElementById(`group-content-${i}`));
            await sleep(50); // 枠が出るアニメーション
        }

        // メンバーを一人ずつ配るアニメーション
        const memberDelay = n > 40 ? 20 : (n > 20 ? 40 : 80);
        
        for (let i = 0; i < n; i++) {
            const num = nums[i];
            const groupIndex = i % g;
            
            const memberChip = document.createElement("span");
            memberChip.className = "pop-in inline-block bg-white border border-slate-300 text-slate-700 font-bold font-mono px-3 py-1.5 rounded-lg shadow-sm text-lg";
            memberChip.textContent = num;
            
            groupElements[groupIndex].appendChild(memberChip);
            
            await sleep(memberDelay);
        }

        // 最後にソートして表示し直す（見やすさのため）
        // アニメーションが終わった後に整理する
        await sleep(300);
        groups.forEach((group, i) => {
             const container = groupElements[i];
             // 数値順にソート
             const sorted = [...group].sort((a, b) => a - b);
             container.innerHTML = ""; // クリア
             sorted.forEach(num => {
                const span = document.createElement("span");
                span.className = "inline-block bg-white border border-slate-300 text-slate-700 font-bold font-mono px-3 py-1.5 rounded-lg shadow-sm text-lg";
                span.textContent = num;
                container.appendChild(span);
             });
        });
    }

    function resetView() {
        if (isAnimating) return;
        
        const emptyState = `
            <div class="col-span-full text-center text-slate-400 py-12 dashed-border bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                <i class="fa-solid ${currentMode === 'group' ? 'fa-layer-group' : 'fa-list-ol'} text-4xl mb-3 block opacity-20"></i>
                準備完了
            </div>
        `;

        if (currentMode === 'order') {
            document.getElementById("result-grid-order").innerHTML = emptyState;
        } else {
            document.getElementById("result-grid-group").innerHTML = emptyState;
        }

        document.getElementById("copy-area").classList.add("hidden");
        document.getElementById("status-area").textContent = "";
        document.getElementById("error-msg").classList.add("hidden");
    }

    function copyToClipboard() {
        const copyText = document.getElementById("result-text");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        
        try {
            document.execCommand('copy');
            const btn = document.querySelector('#copy-area button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> コピー完了';
            btn.classList.add('bg-emerald-50', 'text-emerald-600', 'border-emerald-200');
            
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('bg-emerald-50', 'text-emerald-600', 'border-emerald-200');
            }, 2000);
        } catch (err) {
            alert('コピーに失敗しました');
        }
    }
</script>
</body>
</html>

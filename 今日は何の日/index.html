<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日は何の日？（先生向けアプリ）</title>
    <!-- Tailwind CSSの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* セレクトボックスのデフォルト矢印を消すためのスタイル */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background: transparent;
        }
    </style>
</head>
<body class="min-h-screen bg-orange-50 font-sans text-gray-800 selection:bg-orange-200">

    <!-- ヘッダー -->
    <header class="bg-white shadow-sm border-b-4 border-orange-400 p-4 sticky top-0 z-10">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-orange-100 p-2 rounded-xl text-orange-500">
                    <!-- BookOpenアイコン -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                </div>
                <h1 class="text-xl md:text-2xl font-bold text-orange-600 tracking-tight">
                    先生の「今日は何の日？」
                </h1>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 md:p-6 pb-20">
        <!-- 日付選択エリア -->
        <section class="bg-white rounded-2xl shadow-sm p-6 mb-8 border border-orange-100">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                
                <div class="flex items-center gap-4">
                    <button id="btn-prev" class="p-3 bg-gray-50 hover:bg-orange-50 rounded-full transition-colors text-gray-500 hover:text-orange-600 focus:outline-none focus:ring-2 focus:ring-orange-300" aria-label="前日">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    
                    <div class="flex items-center gap-3">
                        <!-- Calendarアイコン -->
                        <svg class="text-orange-400" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                        
                        <div class="flex items-baseline gap-1">
                            <select id="month-select" class="text-3xl font-black text-gray-800 bg-transparent border-none p-0 focus:ring-0 cursor-pointer text-center outline-none" style="width: 2.5ch;"></select>
                            <span class="text-xl font-bold text-gray-500">月</span>
                            
                            <select id="day-select" class="text-3xl font-black text-gray-800 bg-transparent border-none p-0 focus:ring-0 cursor-pointer text-center outline-none" style="width: 2.5ch;"></select>
                            <span class="text-xl font-bold text-gray-500">日</span>
                        </div>
                    </div>

                    <button id="btn-next" class="p-3 bg-gray-50 hover:bg-orange-50 rounded-full transition-colors text-gray-500 hover:text-orange-600 focus:outline-none focus:ring-2 focus:ring-orange-300" aria-label="翌日">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                </div>

                <button id="btn-generate" class="w-full md:w-auto px-8 py-3 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl shadow-md transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed">
                    <svg id="generate-icon-calendar" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                    <svg id="generate-icon-loader" class="hidden animate-spin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                    <span>この日のお話を生成</span>
                </button>
            </div>
        </section>

        <!-- コンテンツ表示エリア -->
        <section>
            <div class="flex items-center gap-2 mb-6">
                <!-- Infoアイコン -->
                <svg class="text-gray-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                <h2 class="text-lg font-bold text-gray-700">子どもたちに話せる話題</h2>
            </div>

            <div id="content-area">
                <!-- ここにお話やローディングが表示されます -->
            </div>
        </section>
    </main>

    <script>
        // 全366日分のデータを圧縮して保持
        const rawData = {
          "1-1":["元日","毎年","新しい年の始まりを祝う日。年神様が家にやってきて、幸せを運んできてくれると言われています。","お正月はどうやって過ごしたかな？","c"],
          "1-2":["初夢の日","毎年","お正月になってから初めて見る夢のことです。富士山やタカ、ナスの夢を見ると縁起が良いとされています。","みんなはどんな夢を見たか覚えているかな？","c"],
          "1-3":["瞳の日","毎年","「ひ(1)とみ(3)」の語呂合わせ。目を大切にして、きれいな瞳を守る日です。","テレビやゲームを見すぎて、目が疲れていないかな？","s"],
          "1-4":["石の日","毎年","「い(1)し(4)」の語呂合わせ。昔からお地蔵さんなど、私たちの生活は石に守られてきました。","道ばたで面白い形やきれいな石を見つけたことある？","n"],
          "1-5":["イチゴの日","毎年","「い(1)ちご(5)」の語呂合わせ。イチゴの赤い部分は実ではなく、ツブツブの種に見える部分が本当の実です。","イチゴを使ったケーキやデザートは好きかな？","f"],
          "1-6":["ケーキの日","1879年","日本で初めて本格的なケーキがお店で売られ始めたと言われている日です。","ショートケーキとチョコレートケーキ、どっちが好き？","f"],
          "1-7":["七草がゆの日","毎年","春の七草を入れたおかゆを食べる日。お正月で疲れたお腹を休ませ、今年1年の健康を祈ります。","七草がゆを食べた人、または聞いたことある人いるかな？","f"],
          "1-8":["平成スタートの日","1989年","日本の元号が「昭和」から「平成」に変わった最初の日です。みんなのお父さんお母さんが子どもの頃ですね。","今の元号「令和」の前は何という時代だったか知ってる？","h"],
          "1-9":["とんちの日","毎年","「いっ(1)きゅう(9)」の語呂合わせ。頭をひねって面白い答えを出す一休さんの日です。","なぞなぞやクイズを解くのは得意かな？","c"],
          "1-10":["110番の日","毎年","警察を呼ぶときの電話番号「110」の正しい使い方をみんなに知ってもらうための日です。","もし道で迷子になっている小さい子を見つけたらどうする？","h"],
          "1-11":["鏡開き","毎年","お正月に飾った鏡餅（かがみもち）を割って、おしるこなどにして食べる日です。","お餅はどうやって食べるのが一番好き？","c"],
          "1-12":["スキーの日","1911年","オーストリアの軍人さんが、日本人に初めてスキーの滑り方を教えた日です。","スキーやスノーボードをやったことがある人はいるかな？","c"],
          "1-13":["南極観測船が出発","1956年","氷の世界「南極」を調べるため、日本から初めての観測船が出発しました。","ペンギンがたくさんいる雪の世界に行ったら何をしたい？","s"],
          "1-14":["タロとジロの発見","1959年","南極に置き去りにされてしまった犬のタロとジロが、1年後に生きて発見された奇跡の日です。","動物が頑張って生きているお話を聞くとどう思う？","h"],
          "1-15":["手洗いの日","毎年","「い(1)い(1)て(5)」の語呂合わせ。バイキンをやっつけるためにしっかり手を洗おうという日です。","指の間や手首まで、しっかり石鹸で洗えているかな？","s"],
          "1-16":["禁酒の日","1920年","昔、アメリカで「お酒を作ったり売ったりしてはいけない」という法律ができた日です。","大人になったら、お酒を飲んでみたいと思う？","h"],
          "1-17":["おむすびの日","1995年","阪神淡路大震災のときに、たくさんの人がおむすびを作って助け合ったことを忘れないための日です。","おむすびの具で一番好きなのは何かな？","f"],
          "1-18":["118番の日","毎年","海の事故が起きたときに、海上保安庁（海の警察）を呼ぶための電話番号「118」を知ってもらう日です。","海に遊びに行ったとき、気をつけることは何かな？","s"],
          "1-19":["カラオケの日","1946年","ラジオで素人の人たちが歌う「のど自慢」という番組が始まりました。これがカラオケの始まりと言われます。","もしみんなの前で歌うなら、どんな歌を歌いたい？","c"],
          "1-20":["大寒（だいかん）","毎年","1年の中で最も寒さが厳しくなる時期の始まりです。昔の人はこの時期に味噌やお酒を仕込みました。","寒い冬の日に食べたくなる温かい食べ物は何かな？","n"],
          "1-21":["料理番組の日","1937年","イギリスで世界初のテレビの料理番組が放送された日。オムレツの作り方を紹介したそうです。","おうちの人と一緒に料理を作ったことはあるかな？","c"],
          "1-22":["カレーの日","1982年","全国の学校の給食で、みんなが大好きなカレーライスが一斉に出された日です。","給食のカレーと、おうちのカレー、どっちが好き？","f"],
          "1-23":["電子メールの日","毎年","「いい(1)ふみ(23)」の語呂合わせ。スマホやパソコンで一瞬で届くメールの日です。","遠くに住んでいるお友達やおじいちゃんに手紙を書いたことある？","s"],
          "1-24":["学校給食記念日","1946年","戦争が終わった後、食べ物がなかった日本の子どもたちのために、外国からの助けで給食が再開された日です。","今の給食のメニューで一番好きなものは何かな？","f"],
          "1-25":["ホットケーキの日","1902年","日本の観測史上最も寒い「マイナス41度」が記録された日。寒い日は温かいホットケーキを食べて温まろうという日です。","ホットケーキにはシロップとバター、たっぷりかける？","f"],
          "1-26":["文化財防火デー","1949年","世界で一番古い木のお寺「法隆寺」の壁の絵が火事で燃えてしまった悲しい日。宝物を火事から守る日です。","学校や町にある古い建物や神社を見たことはあるかな？","h"],
          "1-27":["国旗制定記念日","1870年","日本の国旗である「日の丸」の大きさとデザインが正式に決められた日です。太陽を表しています。","運動会などで国旗を見たとき、どんな気持ちになるかな？","c"],
          "1-28":["宇宙電波の発見","1932年","アメリカの科学者が、星と星の間から出ている不思議な電波を初めて見つけた日です。","宇宙の遠くには、宇宙人がいると思う？","s"],
          "1-29":["昭和基地ができる","1957年","日本の観測隊が南極に到着し、「昭和基地」という観測のための建物を建てた日です。","空に光るカーテンのようなオーロラ、見てみたい？","s"],
          "1-30":["電話が初めてつながる","1890年","日本で初めて、東京と横浜の間で電話のサービスが始まりました。当時は使い方がわからず苦労したそうです。","昔はスマホがなかったから、待ち合わせはどうやっていたと思う？","h"],
          "1-31":["生命保険の日","1881年","病気になったりケガをした時に、みんなでお金を出し合って助け合う「保険」という仕組みが始まった日です。","困っているお友達がいたら、どうやって助けてあげる？","c"],
          "2-1":["テレビ放送記念日","1953年","NHKが日本で初めてテレビの放送を始めた日です。当時は白黒で、テレビがある家は少ししかありませんでした。","みんなの家では、いつもどんなテレビ番組を見ているかな？","h"],
          "2-2":["交番設置記念日","1881年","日本で初めて「交番」ができた日。おまわりさんが交代で見回りをして地域の安全を守っていました。","町で交番やおまわりさんを見たことあるかな？","h"],
          "2-3":["節分（せつぶん）","毎年","悪いもの（鬼）を追い払って、良いもの（福）を呼び込むために「豆まき」をします。","家で豆まきをした人？「鬼は外、福は内」って言えたかな？","c"],
          "2-4":["立春（りっしゅん）","毎年","暦の上では、この日から春が始まります。まだまだ寒い日が多いですが、少しずつ梅の花が咲き始めます。","春が近づいてきたな、と感じることはあるかな？","n"],
          "2-5":["プロ野球の日","1936年","日本で初めて、プロ野球のチームが集まってリーグ（大会のグループ）が作られた日です。","野球をやっている人、または試合を見たことがある人はいるかな？","c"],
          "2-6":["抹茶の日","毎年","「風炉（ふろ：2・6）」の語呂合わせから、日本の伝統的な抹茶を楽しむ日とされています。","抹茶味のお菓子やアイスは好きかな？どんな味がする？","f"],
          "2-7":["長野オリンピック","1998年","日本の長野県で冬のオリンピックが始まりました。スキージャンプで日本の選手が大活躍しました。","冬のスポーツといえば何を思い浮かべる？","c"],
          "2-8":["郵便マークの日","1887年","手紙を出すときに使う郵便のマーク「〒」が決められた日です。役所の名前の頭文字からとられました。","ポストのマーク「〒」を書けるかな？空中に指で書いてみよう。","h"],
          "2-9":["漫画の日","1989年","鉄腕アトムなどを描いた、漫画の神様と呼ばれる手塚治虫さんが亡くなった日。漫画を愛する日です。","みんなが一番好きな漫画は何かな？","c"],
          "2-10":["ふきのとうの日","毎年","「ふ(2)きのとう(10)」の語呂合わせ。春一番に雪の間から顔を出す、少し苦い味がする食べ物です。","春になって、新しい草や花が生えてきているのを見たかな？","n"],
          "2-11":["建国記念の日","毎年","昔々の神話のお話で、日本の最初の天皇が位についたとされる日です。日本の国ができたことをお祝いします。","日本という国の、どんなところが好きかな？","h"],
          "2-12":["ペニシリンが使われる","1941年","イギリスで、バイキンをやっつける世界初の薬「ペニシリン」が患者さんに使われた日です。","風邪をひいたとき、早く治すためにどうしている？","s"],
          "2-13":["苗字制定記念日","1875年","すべての日本人が「山田」や「佐藤」のような苗字（みょうじ）を必ず名乗るというルールができた日です。","自分の苗字は、どんな漢字を書くか知っているかな？","h"],
          "2-14":["バレンタインデー","毎年","好きな人やお世話になっている人にチョコレートなどのプレゼントを贈る日です。","誰かに「ありがとう」の気持ちを込めてプレゼントをあげたことある？","c"],
          "2-15":["春一番名付けの日","毎年","冬の終わりに初めて吹く、強くて暖かい南風を「春一番」と呼ぶことが決められた日です。","風が強い日、どんなものが飛んでいるのを見たことがある？","n"],
          "2-16":["天気図記念日","1883年","日本で初めて、お天気の様子を描いた「天気図」が作られた日です。","テレビの天気予報で、太陽や傘のマークを見たことはあるかな？","s"],
          "2-17":["天使のささやきの日","1978年","北海道で観測された、空気中の水蒸気が凍ってキラキラ光る「ダイヤモンドダスト」を記念した日です。","雪が太陽の光でキラキラ光っているのを見たことはある？","n"],
          "2-18":["冥王星の発見","1930年","アメリカの天文学者が、太陽系の遠くにある「冥王星（めいおうせい）」という星を初めて見つけた日です。","宇宙にある星の名前、いくつ言えるかな？","s"],
          "2-19":["万国郵便連合","1877年","日本が、世界中の国に手紙を送れるようにするグループに仲間入りした日です。","もし外国のお友達ができたら、何の手紙を書いてみたい？","h"],
          "2-20":["アレルギーの日","1993年","花粉症や食べ物のアレルギーの原因となるものを、日本の研究者が発見したことを記念する日です。","食べると体がかゆくなったりする「アレルギー」について聞いたことある？","s"],
          "2-21":["日刊新聞創刊の日","1872年","日本で初めて、毎日発行される「新聞」が東京で作られた日です。ニュースを伝える大切な道具でした。","お家で新聞を読んでいる人はいるかな？どんなことが書いてある？","h"],
          "2-22":["猫の日","毎年","「ニャン(2)ニャン(2)ニャン(2)」という猫の鳴き声の語呂合わせ。動物を大切にする日でもあります。","みんなは猫と犬、どっちが好き？動物を飼っている人はいるかな？","n"],
          "2-23":["富士山の日","毎年","「ふ(2)じ(2)さん(3)」の語呂合わせ。日本で一番高くて美しい山、富士山の自然を大切にしようという日です。","富士山を絵に描くとしたら、何色を使うかな？","n"],
          "2-24":["鉄道ストライキの日","1898年","日本で初めて、鉄道で働く人たちが「お給料を上げて！休みをちょうだい！」と仕事をお休みしてお願いをした日です。","みんなが大人になってお仕事をするとき、どんなルールがあると嬉しい？","h"],
          "2-25":["夕刊フジ創刊の日","1969年","夕方に駅で買って帰るための新聞が作られ始めた日。大人たちが仕事帰りの電車の中で読んでいました。","電車の中で、本を読んだり景色を見たり、どうやって過ごすのが好き？","c"],
          "2-26":["脱出の日","1815年","フランスの有名な皇帝ナポレオンが、閉じ込められていた島からこっそり脱出（逃げ出すこと）に成功した日です。","もし迷路の中に閉じ込められたら、どうやってゴールを探す？","h"],
          "2-27":["ポケモンの発売日","1996年","世界中で大人気のゲーム「ポケットモンスター 赤・緑」が日本で初めて発売された日です。","みんなの好きなポケモンは何かな？","c"],
          "2-28":["ビスケットの日","1855年","お菓子のビスケットの作り方が書かれた手紙が日本で初めて送られた日。「2度焼かれたもの」という意味があります。","おやつに食べるなら、ビスケットとおせんべい、どっちがいい？","f"],
          "2-29":["うるう日","4年に1度","カレンダーのズレを直すために、4年に1度だけ現れる特別な日です。","もし「特別な1日」がプレゼントされたら、何をしたい？","s"],
          "3-1":["マヨネーズの日","1925年","日本で初めてマヨネーズが売られ始めた日。最初は食べ物とわからず「髪に塗る薬？」と間違える人もいたそうです。","マヨネーズをつけて食べるもので、一番好きなものは何かな？","f"],
          "3-2":["ミニチュアの日","毎年","「ミ(3)ニ(2)」の語呂合わせ。小さなサイズで作られた本物そっくりの車や家などのミニチュアを愛する日です。","もし自分が小さくなったら、どこを探検してみたい？","c"],
          "3-3":["ひな祭り","毎年","女の子が元気に育つようにお願いする日。ひな人形を飾って、ひなあられやちらし寿司を食べます。","ひな人形は飾ったかな？ひなあられはどんな味がする？","c"],

          "8-6":["広島平和記念日","1945年","広島に原子爆弾が落とされた日。戦争の恐ろしさを忘れず、世界中が平和に暮らせるようにお祈りする日です。","お友達とケンカしちゃったとき、どうやって仲直りする？","h"],
          "8-7":["バナナの日","毎年","「バ(8)ナナ(7)」の語呂合わせ。バナナはすぐにエネルギーに変わるのでスポーツ前や夏の暑い日にぴったりです。","バナナの皮をむくとき、どっちの端っこからむく？","f"],
          "8-8":["葉っぱの日","毎年","「は(8)っぱ(8)」の語呂合わせ。木や草の葉っぱは、私たちが息をするためのきれいな空気を作ってくれています。","公園で、自分の顔より大きな葉っぱを見つけたことある？","n"],
          "8-9":["長崎原爆・野球の日","1945年","長崎の平和を祈る日。また「や(8)きゅう(9)」の語呂合わせで、平和に野球やスポーツを楽しめることに感謝する日です。","平和な毎日の中で、ボール遊びやスポーツができるって幸せなことだね。","h"],
          "8-10":["帽子の日","毎年","「ハ(8)ット(10)」の語呂合わせ。夏の強い日差しから頭を守るために、外に出る時は帽子をかぶることが大切です。","外で遊ぶとき、ちゃんと帽子をかぶって熱中症に気をつけているかな？","c"],
          "8-11":["山の日","毎年","山に親しみ、山の恩恵に感謝するという日本の祝日です。山には虫や動物、綺麗な川など自然がいっぱいです。","もし山に探検に行くとしたら、どんな生き物を見つけたい？","n"],
          "8-12":["太平洋横断記念日","1962年","日本人の堀江さんが、たった1人でヨットに乗って日本からアメリカまで海を渡りきったすごい日です。","たった1人で海の上をずっと進むって、どんな気持ちだと思う？","h"],
          "8-13":["左利きの日","毎年","世界中の左利きの人が生活しやすいように考える日。ハサミなど右利き用に作られているものがたくさんあります。","みんなの中で、字を書いたりご飯を食べる手が「左手」の人はいるかな？","c"],
          "8-14":["水泳の日","毎年","みんなでプールや海で泳いで楽しく学ぶ日。水の中で体を動かすととても気持ちが良くて体も丈夫になります。","プールで泳ぐとき、クロールと平泳ぎ、どっちが得意かな？","c"],
          "8-15":["終戦記念日","1945年","日本が大きな戦争を終わらせた日です。二度と戦争をしないと誓い、今の平和な毎日に感謝する大切な日です。","「平和だな」「幸せだな」と感じるのはどんな時？","h"],
          "8-16":["五山送り火","毎年","京都の山に「大」の字などの火を燃やすお祭り。お盆に帰ってきたご先祖様を空へお見送りする行事です。","お盆休みに、おじいちゃんやおばあちゃんのお家に行ったかな？","c"],
          "8-17":["パイナップルの日","毎年","「パ(8)イ(1)ナ(7)ップル」の語呂合わせ。チクチクした皮の中に甘酸っぱい黄色い実が詰まった南国の果物です。","パイナップルが木になるか、土から生えるか知ってる？（正解は土！）","f"],
          "8-18":["米（こめ）の日","毎年","「米」という漢字は「八十八」になることから。お米を作るのには88回の手間がかかると言われます。","お茶碗にご飯つぶを残さずに、きれいに食べられているかな？","f"],
          "8-19":["バイクの日","毎年","「バ(8)イ(1)ク(9)」の語呂合わせ。オートバイに安全に乗るための日。バイクは車と違って体をむき出しにして走ります。","大人になって乗り物に乗るなら、車とバイク、どっちに乗ってみたい？","h"],
          "8-20":["蚊（か）の日","1897年","イギリスのお医者さんが、蚊が悪い病気を運ぶことを発見した日。外で遊ぶときは蚊に刺されないよう気をつけましょう。","蚊に刺されて、かゆーい！となったことあるかな？","s"],
          "8-21":["噴水の日","1877年","東京の上野公園に日本で初めての立派な噴水ができた日。下から水が吹き出す様子は涼しくてきれいですね。","公園や広場で、お水が吹き出す噴水を見たことあるかな？","h"],
          "8-22":["チンチン電車の日","1903年","東京で初めて、道路の上を走る路面電車が走り始めた日。「チンチン」と鐘を鳴らしながら走っていました。","道路の上を車と一緒に走る電車、乗ってみたくない？","h"],
          "8-23":["ウクレレの日","毎年","ハワイでよく弾かれる、小さなギターのような楽器の記念日。ポロンポロンと温かい南国のような音がします。","ハワイなどの温かい南の島に行ったら、何をして遊びたい？","c"],
          "8-24":["ポテトチップスの日","1853年","アメリカで、じゃがいもを薄く切って油で揚げたポテトチップスが初めて作られたと言われている日です。","ポテトチップスは、うすしお味とコンソメ味、どっちが好き？","f"],
          "8-25":["即席ラーメンの日","1958年","お湯をかけるだけで食べられる「チキンラーメン」が日本で初めて発売された日です。日本の大発明です。","カップラーメンや袋のラーメン、おうちで食べたことあるかな？","f"],
          "8-26":["火山の日","1911年","日本で初めて火山を専門に調べる観測所ができた日。地球が生きていることを教えてくれる火山のことを学びます。","山のてっぺんからモクモクと煙が出ているのを見たことある？","s"],
          "8-27":["ジェラートの日","1953年","イタリアで作られる、果物などがたっぷり入った美味しいアイスクリーム「ジェラート」を楽しむ日です。","いろんな味のアイスが並んでいたら、どれを選ぶか迷っちゃうね。","f"],
          "8-28":["バイオリンの日","1880年","日本で作られた初めてのバイオリンが完成した日。弓で糸をこすってきれいな音を出す楽器です。","バイオリンの音色を、テレビや音楽の授業で聞いたことあるかな？","c"],
          "8-29":["焼肉の日","毎年","「や(8)きに(2)く(9)」の語呂合わせ。夏バテしないように、お肉や野菜をジュージュー焼いてモリモリ食べる日です。","焼肉を食べに行ったら、お肉と一緒に野菜も食べているかな？","f"],
          "8-30":["富士山測候所の日","1895年","日本で一番高い富士山のてっぺんに、お天気を調べるための建物ができた日。高いところから台風などを調べていました。","雲よりも高い山のてっぺんは、夏でも雪が降るくらい寒いんだよ！","s"],
          "8-31":["野菜の日","毎年","「や(8)さ(3)い(1)」の語呂合わせ。太陽の光をいっぱい浴びて育った野菜を食べて、体を強く健康にする日です。","みんなの一番好きな野菜、または少し苦手な野菜は何かな？","f"],
          "9-1":["防災の日","1923年","昔、関東大震災という大きな地震があった日。地震や台風などの災害について考え、備える日です。","学校や家で、避難の訓練をやったことはあるかな？","s"],
          "9-2":["くじらの日","毎年","「く(9)じ(2)ら」の語呂合わせ。海に住む世界で一番大きな哺乳類、くじらのことを知る日です。","海で潮を吹くおおきなくじら、見てみたいかな？","n"],
          "9-3":["グミの日","毎年","「グ(9)ミ(3)」の語呂合わせ。プニプニした食感が美味しいお菓子のグミを楽しむ日です。","グミはぶどう味？みかん味？何味が好きかな？","f"],
          "9-4":["くしの日","毎年","「く(9)し(4)」の語呂合わせ。髪の毛をきれいにとかす「くし」や美容師さんに感謝する日です。","朝起きると、髪の毛が寝ぐせでボサボサになっていないかな？","c"],
          "9-5":["石炭の日","毎年","「ク(9)リーン・コ(5)ール」の語呂合わせ。昔の機関車などを動かしていた黒い石「石炭」の大切さを学ぶ日です。","煙をモクモク出して走るSL機関車、絵本などで見たことある？","s"],
          "9-6":["黒豆の日","毎年","「く(9)ろ(6)まめ」の語呂合わせ。お正月のおせち料理にも入っている、甘くて美味しい黒いお豆です。","黒豆を食べると、マメ（元気）に暮らせると言われているよ！","f"],
          "9-7":["CMソングの日","1951年","日本で初めて、ラジオのCM（コマーシャル）で宣伝のための歌が流れた日です。","テレビのCMで流れる歌で、ついつい歌っちゃう曲はあるかな？","c"],
          "9-8":["ハヤシライスの日","毎年","ハヤシライスを発明したと言われる早矢仕（はやし）さんの誕生日。お肉と玉ねぎが美味しいご飯です。","カレーライスとハヤシライス、見た目は似てるけど味が違うね。どっちが好き？","f"],
          "9-9":["救急の日","毎年","「きゅう(9)きゅう(9)」の語呂合わせ。救急車や救急医療について正しく知ってもらうための日です。","ピーポーピーポーと鳴る救急車は、どんな時に呼ぶ車かな？","s"],
          "9-10":["下水道の日","毎年","私たちが使って汚れたお水を、きれいにして川や海に返す「下水道」の大切さを知る日です。","手を洗った後のお水がどこに流れていくか、考えたことある？","s"],
          "9-11":["公衆電話の日","1900年","日本で初めて、お金を入れると誰でも使える公衆電話が東京の駅に置かれた日です。","道ばたにある緑色の電話機、見たことあるかな？","h"],
          "9-12":["宇宙の日","1992年","日本人の毛利さんが宇宙船スペースシャトルに乗って宇宙へ出発した日です。宇宙について考える日です。","もし宇宙に行けたら、どんな実験をしてみたい？","s"],
          "9-13":["世界の法の日","1965年","世界中の国が、戦争ではなく「法（ルール）」を守ることで平和な世界を作ろうと決めた日です。","みんながルールを守らないと、どんな困ったことが起きるかな？","c"],
          "9-14":["コスモスの日","毎年","秋に咲くピンクや白の可愛いお花、コスモスの日。ホワイトデーからちょうど半年で、プレゼントを贈り合う日です。","秋の風に揺れるコスモスのお花、見たことあるかな？","n"],
          "9-15":["老人の日","毎年","おじいちゃんやおばあちゃんなど、長く生きて色々なことを知っているお年寄りを大切にする日です。","おじいちゃんやおばあちゃんに「いつもありがとう」って伝えたかな？","c"],
          "9-16":["マッチの日","1948年","火をつける便利な道具「マッチ」のルールが新しくなった日。昔はガスコンロがなくマッチで火をつけていました。","マッチ棒をシュッとこすって火をつけるところ、見たことある？","h"],
          "9-17":["モノレールの日","1964年","東京で日本初の旅客用モノレールが走り始めた日。普通の線路ではなく、一本の太いレールをまたいで走ります。","高いところを走るモノレールに乗ったことあるかな？","h"],
          "9-18":["かいわれ大根の日","毎年","8を横にして1の下に書くとかいわれ大根の形に見えることから。ピリッと辛い小さな野菜です。","サラダに入っている細いかいわれ大根、食べたことある？","f"],
          "9-19":["苗字の日","1870年","平民と呼ばれていた一般の人たちも、みんな苗字（みょうじ）を名乗って良いと決められた日です。","お友達の苗字、漢字でどう書くか知っているかな？","h"],
          "9-20":["バスの日","1903年","日本で初めて、エンジンで走る乗り合いバスが京都の町を走り始めた日です。","たくさんの人が一緒に乗れるバスに乗って、どこへ行きたい？","h"],
          "9-21":["国際平和デー","毎年","世界中の国がケンカ（戦争）をやめて、平和について考える国連が定めた日です。","みんなのクラスがいつも仲良しで平和でいるための秘訣は何かな？","c"],
          "9-22":["フィットネスの日","毎年","体を動かして健康になるフィットネスを楽しむ日。秋は涼しくてスポーツにぴったりの季節です。","走ったり跳んだり、体を動かすのは好きかな？","c"],
          "9-23":["秋分の日","毎年","お昼と夜の長さがだいたい同じになる日。この日を過ぎると少しずつ秋が深まり、夜が長くなっていきます。","秋になって、木の実や赤い落ち葉を見つけた人はいるかな？","n"],
          "9-24":["清掃の日","1971年","ゴミを減らして、町をきれいにするための法律ができた日。みんなの町をきれいにお掃除する日です。","自分の学校や家の周りに、ゴミは落ちていないかな？","c"],
          "9-25":["10円カレーの日","1971年","東京のレストランが、感謝の気持ちを込めて10円でカレーを出したという心温まる日です。","もし10円で何でも買えるとしたら、何を買う？","f"],
          "9-26":["ワープロの日","1978年","日本で初めて、日本語の文章を打ってきれいに印刷できる機械「ワープロ」が発表された日です。","パソコンのキーボードで文字を打ったことあるかな？","h"],
          "9-27":["世界観光の日","1980年","世界中の色々な国に旅行（観光）へ行って、その国のことを知ろうという日です。","外国の景色や美味しい食べ物、テレビで見たことあるかな？","c"],
          "9-28":["パソコン記念日","1979年","日本の会社が作ったパソコンが初めて発売された日。今ではみんなの生活に欠かせないものになりました。","パソコンやタブレットでどんなことを調べるのが好き？","s"],
          "9-29":["招き猫の日","毎年","「くる(9)ふ(2)く(9)＝来る福」の語呂合わせ。お店に飾ってある、手を挙げた猫の置物です。","招き猫は右手を挙げているのと左手を挙げているのがあるって知ってた？","c"],
          "9-30":["くるみの日","毎年","「く(9)るみ(3)はまるい(0)」の語呂合わせ。硬い殻の中に美味しい実が入っている木の実です。","リスはくるみなどの木の実を土に隠すんだって。面白いね。","n"],
          "10-1":["コーヒーの日","毎年","秋になると温かいコーヒーがたくさん飲まれるようになることから。大人の人が好きな少し苦い飲み物です。","コーヒーのいい香り、嗅いだことあるかな？","f"],
          "10-2":["豆腐の日","毎年","「とう(10)ふ(2)」の語呂合わせ。大豆から作られる真っ白で柔らかい豆腐は栄養満点です。","お味噌汁の中に入っているお豆腐は好きかな？","f"],
          "10-3":["登山の日","毎年","「と(10)ざん(3)」の語呂合わせ。秋の涼しい山に登って、綺麗な景色や自然を楽しむ日です。","山登りをして、てっぺんでおにぎりを食べたら美味しそうだね！","n"],
          "10-4":["イワシの日","毎年","「い(1)わ(0)し(4)」の語呂合わせ。海を群れで泳ぐお魚で、食べると頭が良くなると言われています。","お魚をきれいに骨だけ残して食べられるかな？","f"],
          "10-5":["レモンの日","1938年","有名な詩人である高村光太郎が、奥さんの亡くなる前にレモンをかませたという悲しくも美しい詩に由来する日です。","レモンを食べた時のすっぱーい顔、できるかな？","f"],
          "10-6":["夢をかなえる日","毎年","みんなが持っている夢を応援し、その夢に向かって頑張る日です。","みんなが大人になったらなりたい職業は何かな？","c"],
          "10-7":["ミステリー記念日","1849年","世界で初めて探偵が出てくる不思議なお話（ミステリー）を書いたエドガー・アラン・ポーが亡くなった日。","なぞなぞや、犯人を探すような本を読むのは好きかな？","c"],
          "10-8":["木の日","毎年","「十」と「八」を組み合わせると「木」という漢字になることから。森の木々に感謝する日です。","木で作られた机や椅子、触ってみるとどんな温かさがあるかな？","n"],
          "10-9":["トラックの日","毎年","「ト(10)ラック(9)」の語呂合わせ。みんなの家やお店に荷物を運んでくれる大きなトラックに感謝する日です。","道路を走る大きなトラック、かっこいいと思ったことある？","c"],
          "10-10":["目の愛護デー","毎年","「10 10」を横に倒すと目と眉毛の形に見えることからできた日。目を大切に休ませる日です。","ゲームやテレビを見た後、目を休めるためにどんなことができるかな？","s"],
          "10-11":["ウインクの日","毎年","「10」と「11」を横に倒すと、ウインク（片目をつぶる）している顔に見えることから。","片目だけパチッとつぶるウインク、上手にできるかな？","c"],
          "10-12":["豆乳の日","毎年","「とう(10)にゅう(12)」の語呂合わせ。大豆を絞って作られる、牛乳のような栄養たっぷりの飲み物です。","豆乳を飲んだことある？牛乳と味がどう違うかな？","f"],
          "10-13":["サツマイモの日","毎年","秋はサツマイモが一番美味しくなる季節です。江戸時代からサツマイモが名物だった川越市が作った日。","ホクホクの焼き芋、甘くて美味しいよね！","f"],
          "10-14":["鉄道の日","1872年","日本で初めて、新橋から横浜の間に鉄道（汽車）が走った日です。汽笛を鳴らして走りました。","電車や新幹線に乗って、どこかにお出かけしたことある？","h"],
          "10-15":["きのこの日","毎年","秋はきのこがスーパーにたくさん並ぶ季節。きのこをたくさん食べて元気に過ごそうという日です。","しいたけ、えのき、しめじ。みんなの好きなきのこは何かな？","f"],
          "10-16":["辞書の日","1758年","アメリカの有名な辞書を作ったノア・ウェブスターの誕生日。わからない言葉を調べる大切な本です。","国語辞典を使って、言葉の意味を調べたことはあるかな？","c"],
          "10-17":["貯蓄の日","毎年","お金の無駄遣いをしないで、大切な時のために少しずつ貯金（ちょきん）をしようという日です。","ブタさんの貯金箱にお金を入れたことあるかな？","c"],
          "10-18":["冷凍食品の日","毎年","冷凍の「とう(10)」と、冷凍庫のちょうど良い温度マイナス18度から。温めるだけですぐ食べられる便利なご飯です。","お弁当に入っている冷凍のから揚げ、美味しいよね！","f"],
          "10-19":["海外旅行の日","毎年","「遠(10)くへ行(19)く」の語呂合わせ。パスポートを持って飛行機に乗り、外国の文化を知る日です。","もし外国に行けるなら、どこの国に行ってみたい？","c"],
          "10-20":["リサイクルの日","毎年","「10(ひとまわり)20(ふたまわり)」の語呂合わせ。ゴミを捨てずに、もう一度新しいものに作り直すことです。","ペットボトルや牛乳パックを、きれいに洗ってリサイクルに出しているかな？","s"],
          "10-21":["あかりの日","1879年","発明王エジソンが、世界で初めて実用的な白熱電球（電気のあかり）を完成させた日です。","もし電気がなくて真っ暗だったら、夜はどうやって過ごす？","s"],

        let currentDate = new Date();

        // 月のセレクトボックスを初期化
        function initMonthSelect() {
            let html = '';
            for (let i = 1; i <= 12; i++) {
                html += `<option value="${i}">${i}</option>`;
            }
            monthSelect.innerHTML = html;
            monthSelect.value = currentMonth;
        }

        // 日のセレクトボックスを初期化（選択された月に合わせて日数を変更）
        function updateDaySelect() {
            // 2024年（うるう年）で日数を計算
            const daysInMonth = new Date(2024, currentMonth, 0).getDate();
            let html = '';
            for (let i = 1; i <= daysInMonth; i++) {
                html += `<option value="${i}">${i}</option>`;
            }
            daySelect.innerHTML = html;
            
            // 選択されていた日が新しい月の最大日数を超えていた場合は調整
            if (currentDay > daysInMonth) {
                currentDay = daysInMonth;
            }
            daySelect.value = currentDay;
        }

                case 'h': return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-600"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>';
                case 'n': return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
                case 's': return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
                case 'c': return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
                case 'f': return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
                default: return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
            }
        }

        // データを取得して表示する
        function fetchAndDisplayEvents() {
            // ローディング状態にする
            btnGenerate.disabled = true;
            iconCalendar.classList.add('hidden');
            iconLoader.classList.remove('hidden');

            contentArea.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 animate-pulse">
                        <div class="h-6 bg-gray-200 rounded-md w-1/3 mb-4"></div>
                        <div class="h-4 bg-gray-200 rounded-md w-full mb-2"></div>
                        <div class="h-4 bg-gray-200 rounded-md w-5/6"></div>
                        <div class="mt-6 bg-orange-50 h-16 rounded-xl"></div>
                    </div>
                    <div class="text-center text-orange-500 font-medium flex flex-col items-center gap-2">
                        <svg class="animate-spin" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                        <p class="animate-pulse">お話を探しています...</p>
                    </div>
                </div>
            `;

            // API通信を模倣した少しの遅延
            setTimeout(() => {
                const dateKey = `${currentMonth}-${currentDay}`;
                const foundData = rawData[dateKey] || fallbackData;
                
                const event = {
                    title: foundData[0],
                    year: foundData[1],
                    explanation: foundData[2],
                    talkHint: foundData[3],
                    iconCategory: foundData[4]
                };

                // コンテンツの描画
                contentArea.innerHTML = `
                    <div class="space-y-6">
                        <div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow border border-orange-100">
                            <div class="p-6">
                                <div class="flex items-start gap-4 mb-4">
                                    <div class="bg-orange-50 p-3 rounded-full mt-1 flex-shrink-0">
                                        ${getIconSvg(event.iconCategory)}
                                    </div>
                                    <div>
                                        <div class="text-sm font-bold text-orange-500 mb-1 tracking-wider">
                                            ${event.year}
                                        </div>
                                        <h3 class="text-xl md:text-2xl font-black text-gray-800 leading-tight">
                                            ${event.title}
                                        </h3>
                                    </div>
                                </div>
                                
                                <div class="ml-[3.25rem] md:ml-[4.25rem]">
                                    <p class="text-gray-700 leading-relaxed text-lg mb-6 whitespace-pre-line">${event.explanation}</p>
                                    
                                    <div class="bg-orange-50 rounded-xl p-4 border border-orange-200 relative">
                                        <div class="absolute -top-3 left-4 bg-orange-500 text-white text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1 shadow-sm">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
                                            <span>先生からの問いかけヒント</span>
                                        </div>
                                        <p class="text-orange-900 font-bold mt-2 text-lg">
                                            「 ${event.talkHint} 」
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // ローディング解除
                btnGenerate.disabled = false;
                iconLoader.classList.add('hidden');
                iconCalendar.classList.remove('hidden');
            }, 400);
        }

        // 日付を変更する関数
        function changeDateByOffset(offset) {
            const newDate = new Date(2024, currentMonth - 1, currentDay + offset);
            currentMonth = newDate.getMonth() + 1;
            currentDay = newDate.getDate();
            
            monthSelect.value = currentMonth;
            updateDaySelect();
            fetchAndDisplayEvents();
        }

        // イベントリスナーの登録
        monthSelect.addEventListener('change', (e) => {
            currentMonth = parseInt(e.target.value);
            updateDaySelect();
        });

        daySelect.addEventListener('change', (e) => {
            currentDay = parseInt(e.target.value);
        });

        btnPrev.addEventListener('click', () => changeDateByOffset(-1));
        btnNext.addEventListener('click', () => changeDateByOffset(1));
        btnGenerate.addEventListener('click', fetchAndDisplayEvents);

        // アプリ起動時の初期化
        initMonthSelect();
        updateDaySelect();
        fetchAndDisplayEvents();

    </script>
</body>
</html>

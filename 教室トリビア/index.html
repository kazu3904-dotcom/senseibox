<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>教室トリビア</title>
    <style>
        :root {
            --bg: #0b1121;
            --card: rgba(255, 255, 255, .06);
            --border: rgba(255, 255, 255, .12);
            --text: #f8fafc;
            --muted: #a7b0c0;
            --accent: #60a5fa;
            --accent2: #34d399;
            --danger: #fb7185;
            --shadow: 0 14px 40px rgba(0, 0, 0, .45);
            --r: 18px;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
            background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, transparent 55%), var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 18px
        }

        header {
            display: flex;
            gap: 14px;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0 16px;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            letter-spacing: .02em
        }

        .sub {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr .8fr;
            gap: 16px;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr
            }
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            box-shadow: var(--shadow);
            padding: 14px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        @media (max-width: 560px) {
            .controls {
                grid-template-columns: 1fr
            }
        }

        label {
            font-size: 12px;
            color: var(--muted);
            display: block;
            margin: 0 0 6px
        }

        select,
        button,
        input[type="checkbox"] {
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, .25);
            color: var(--text);
            outline: none;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap
        }

        .btnrow {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 10px 14px;
            cursor: pointer;
            color: #081023;
            background: linear-gradient(135deg, var(--accent), #93c5fd);
            font-weight: 700;
        }

        button.secondary {
            background: rgba(255, 255, 255, .10);
            color: var(--text);
            border: 1px solid var(--border);
            font-weight: 600;
        }

        button.danger {
            background: rgba(251, 113, 133, .12);
            color: var(--text);
            border: 1px solid rgba(251, 113, 133, .35);
            font-weight: 700;
        }

        button:active {
            transform: translateY(1px)
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            user-select: none;
        }

        .toggle input {
            transform: scale(1.1)
        }

        .pill {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .05);
            color: var(--muted);
            font-size: 12px;
        }

        .trivia-title {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .trivia-title h2 {
            margin: 0;
            font-size: 20px;
            line-height: 1.25;
        }

        .meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px
        }

        .section {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(0, 0, 0, .18);
            margin-top: 10px;
        }

        .section b {
            display: block;
            color: #dbeafe;
            margin-bottom: 6px
        }

        .section p {
            margin: 0;
            color: var(--text);
            line-height: 1.65
        }

        .small {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.5
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mini {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(0, 0, 0, .18);
        }

        .mini .t {
            font-weight: 700
        }

        .mini .m {
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px
        }

        .mini .actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .mini button {
            padding: 8px 10px;
            border-radius: 12px;
            font-size: 12px
        }

        footer {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 12px
        }

        a {
            color: #bfdbfe
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header>
            <div>
                <h1>教室トリビア</h1>
                <div class="sub">ボタン1つで「そのまま話せる」1分ネタ。お気に入り・履歴・今日の固定つき。</div>
            </div>
            <div class="pill" id="countPill">データ: 0件</div>
        </header>

        <div class="grid">
            <!-- LEFT: MAIN -->
            <section class="card">
                <div class="controls">
                    <div>
                        <label for="grade">学年</label>
                        <select id="grade">
                            <option value="all">指定なし</option>
                            <option value="low">低学年</option>
                            <option value="mid">中学年</option>
                            <option value="high">高学年</option>
                            <option value="jhs">中学生</option>
                        </select>
                    </div>
                    <div>
                        <label for="category">カテゴリ</label>
                        <select id="category">
                            <option value="all">ランダム（全カテゴリ）</option>
                            <option value="食べ物">食べ物</option>
                            <option value="体">体</option>
                            <option value="生き物">生き物</option>
                            <option value="科学">科学</option>
                            <option value="日本">日本</option>
                            <option value="季節">季節</option>
                            <option value="学校">学校</option>
                            <option value="歴史">歴史</option>
                        </select>
                    </div>
                </div>

                <div class="btnrow">
                    <button id="btnPick">トリビアを出す</button>
                    <button class="secondary" id="btnShort">短縮モード</button>
                    <div class="toggle">
                        <input type="checkbox" id="todayFixed" />
                        <label for="todayFixed" style="margin:0;color:var(--text);font-size:13px">今日の1つ（固定）</label>
                    </div>
                    <button class="secondary" id="btnCopy">台本をコピー</button>
                </div>

                <div class="small" id="hint">
                    「今日の1つ（固定）」をONにすると、その日の同じ条件（学年・カテゴリ）では同じネタが出ます。
                </div>

                <div style="height:10px"></div>

                <div class="trivia-title">
                    <div>
                        <h2 id="tTitle">まだ出していません</h2>
                        <div class="meta" id="tMeta"></div>
                    </div>
                    <div class="row">
                        <button class="secondary" id="btnFav">☆ お気に入り</button>
                    </div>
                </div>

                <div id="tBody"></div>
                <div class="btnrow" id="answerBtnRow" style="display:none; margin-top:12px;">
                    <button class="secondary" id="btnShowAnswer"
                        style="width:100%; border-color:var(--accent2); color:var(--accent2);">💡 こたえ・ヒントを見る</button>
                </div>
                <div id="tAnswer" class="section"
                    style="display:none; margin-top:10px; border:1px solid var(--accent2); background:rgba(52,211,153,.1);">
                    <b style="color:var(--accent2); font-size:16px;">💡 こたえ・ヒント</b>
                    <p id="tAnswerText" style="font-weight:bold; margin-top:4px; line-height:1.6;"></p>
                </div>

                <footer>
                    ※学校向けに、誤情報を減らすため「固定データ方式」です。必要なら後でネタを差し替えできます。
                </footer>
            </section>

            <!-- RIGHT: FAVORITES & HISTORY -->
            <aside class="card">
                <div class="row" style="justify-content:space-between">
                    <div class="pill">お気に入り</div>
                    <button class="danger" id="btnClearFav">お気に入りを消す</button>
                </div>
                <div style="height:10px"></div>
                <div class="list" id="favList"></div>

                <div style="height:14px"></div>

                <div class="row" style="justify-content:space-between">
                    <div class="pill">履歴（直近10件）</div>
                    <button class="secondary" id="btnClearHistory">履歴を消す</button>
                </div>
                <div style="height:10px"></div>
                <div class="list" id="historyList"></div>
            </aside>
        </div>
    </div>

        ];

        // ====== ユーティリティ ======
        const $ = (id) => document.getElementById(id);

        function todayKey() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, "0");
            const da = String(d.getDate()).padStart(2, "0");
            return `${y}-${m}-${da}`;
        }

        // 文字列ハッシュ（seed用）
        function hashStr(str) {
            let h = 2166136261 >>> 0;
            for (let i = 0; i < str.length; i++) {
                h ^= str.charCodeAt(i);
                h = Math.imul(h, 16777619);
            }
            return h >>> 0;
        }

        // Mulberry32 RNG
        function mulberry32(a) {
            return function () {
                let t = a += 0x6D2B79F5;
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function gradeLabel(g) {
            return ({ all: "指定なし", low: "低学年", mid: "中学年", high: "高学年", jhs: "中学生" }[g] ?? g);
        }

        function shortText(t) {
            return `【${t.title}】\n導入：${t.intro}\nえっ！：${t.surprise}\n質問：${t.question}\nこたえ：${t.answer || ""}`;
        }

        function fullText(t) {
            return `【${t.title}】\n\n●導入\n${t.intro}\n\n●えっ！ポイント\n${t.surprise}\n\n●なぜ？\n${t.reason}\n\n●先生のひとこと\n${t.comment}\n\n●みんなに質問\n${t.question}\n\n●こたえ・ヒント\n${t.answer || ""}`;
        }

        // ====== 状態 ======
        const storage = {
            getFav() { return JSON.parse(localStorage.getItem("ct_fav") || "[]"); },
            setFav(v) { localStorage.setItem("ct_fav", JSON.stringify(v)); },
            getHist() { return JSON.parse(localStorage.getItem("ct_hist") || "[]"); },
            setHist(v) { localStorage.setItem("ct_hist", JSON.stringify(v)); },
        };

        let current = null;
        let isShort = false;

        // ====== フィルタ ======
        function filteredList() {
            const g = $("grade").value;
            const c = $("category").value;
            return TRIVIA.filter(t => {
                const okGrade = (g === "all") || (t.grade === "all") || (t.grade === g);
                const okCat = (c === "all") || (t.category === c);
                return okGrade && okCat;
            });
        }

        // ====== 抽選 ======
        function pickOne() {
            const list = filteredList();
            if (list.length === 0) return null;

            const fixed = $("todayFixed").checked;
            if (!fixed) {
                const idx = Math.floor(Math.random() * list.length);
                return list[idx];
            }

            // 今日固定：日付+条件でseed
            const seedStr = todayKey() + "|" + $("grade").value + "|" + $("category").value + "|教室トリビア";
            const rng = mulberry32(hashStr(seedStr));
            const idx = Math.floor(rng() * list.length);
            return list[idx];
        }

        // ====== 表示 ======
        function renderTrivia(t) {
            current = t;
            $("tTitle").textContent = t.title;

            const meta = [];
            meta.push(`<span class="pill">カテゴリ：${t.category}</span>`);
            meta.push(`<span class="pill">学年：${gradeLabel($("grade").value)}</span>`);
            meta.push(`<span class="pill">表示：${isShort ? "短縮" : "通常"}</span>`);
            $("tMeta").innerHTML = meta.join("");

            const body = [];
            body.push(`<div class="section"><b>導入</b><p>${escapeHtml(t.intro)}</p></div>`);
            body.push(`<div class="section"><b>えっ！ポイント</b><p>${escapeHtml(t.surprise)}</p></div>`);
            if (!isShort) {
                body.push(`<div class="section"><b>なぜ？</b><p>${escapeHtml(t.reason)}</p></div>`);
                body.push(`<div class="section"><b>先生のひとこと</b><p>${escapeHtml(t.comment)}</p></div>`);
            }
            body.push(`<div class="section"><b>みんなに質問</b><p>${escapeHtml(t.question)}</p></div>`);
            $("tBody").innerHTML = body.join("");

            $("tAnswer").style.display = "none";
            if (t.answer) {
                $("tAnswerText").textContent = t.answer;
                $("answerBtnRow").style.display = "flex";
            } else {
                $("answerBtnRow").style.display = "none";
            }

            // favボタン表示
            const fav = storage.getFav();
            const key = triviaKey(t);
            const isFav = fav.some(x => x.key === key);
            $("btnFav").textContent = isFav ? "★ お気に入り解除" : "☆ お気に入り";

            // 履歴追加（重複は先頭に移動）
            pushHistory(t);
            renderFav();
            renderHistory();
        }

        function escapeHtml(s) {
            return String(s)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function triviaKey(t) {
            // title+category で一意っぽく
            return `${t.category}::${t.title}`;
        }

        // ====== お気に入り ======
        function toggleFav() {
            if (!current) return;
            const fav = storage.getFav();
            const key = triviaKey(current);
            const idx = fav.findIndex(x => x.key === key);
            if (idx >= 0) {
                fav.splice(idx, 1);
            } else {
                fav.unshift({ key, trivia: current, at: Date.now() });
            }
            storage.setFav(fav);
            renderTrivia(current);
        }

        function renderFav() {
            const fav = storage.getFav();
            const box = $("favList");
            if (fav.length === 0) {
                box.innerHTML = `<div class="small">まだありません。気に入ったネタは「☆お気に入り」で保存できます。</div>`;
                return;
            }
            box.innerHTML = fav.map(item => {
                const t = item.trivia;
                return `
      <div class="mini">
        <div class="t">${escapeHtml(t.title)}</div>
        <div class="m">カテゴリ：${escapeHtml(t.category)} / ${escapeHtml(t.intro)}</div>
        <div class="actions">
          <button class="secondary" data-act="showFav" data-key="${escapeHtml(item.key)}">表示</button>
          <button class="danger" data-act="delFav" data-key="${escapeHtml(item.key)}">削除</button>
        </div>
      </div>
    `;
            }).join("");
        }

        // ====== 履歴 ======
        function pushHistory(t) {
            const hist = storage.getHist();
            const key = triviaKey(t);

            const filtered = hist.filter(x => x.key !== key);
            filtered.unshift({ key, trivia: t, at: Date.now() });
            const limited = filtered.slice(0, 10);

            storage.setHist(limited);
        }

        function renderHistory() {
            const hist = storage.getHist();
            const box = $("historyList");
            if (hist.length === 0) {
                box.innerHTML = `<div class="small">まだありません。「トリビアを出す」で履歴に残ります。</div>`;
                return;
            }
            box.innerHTML = hist.map(item => {
                const t = item.trivia;
                return `
      <div class="mini">
        <div class="t">${escapeHtml(t.title)}</div>
        <div class="m">カテゴリ：${escapeHtml(t.category)} / ${escapeHtml(t.surprise)}</div>
        <div class="actions">
          <button class="secondary" data-act="showHist" data-key="${escapeHtml(item.key)}">表示</button>
        </div>
      </div>
    `;
            }).join("");
        }

        function findByKey(key) {
            // fav/hist から探す
            const fav = storage.getFav();
            const f = fav.find(x => x.key === key);
            if (f) return f.trivia;

            const hist = storage.getHist();
            const h = hist.find(x => x.key === key);
            if (h) return h.trivia;

            // TRIVIAからも探す
            const [cat, title] = key.split("::");
            return TRIVIA.find(t => t.category === cat && t.title === title) || null;
        }

        // ====== コピー ======
        async function copyScript() {
            if (!current) return;
            const text = isShort ? shortText(current) : fullText(current);
            try {
                await navigator.clipboard.writeText(text);
                $("btnCopy").textContent = "コピーしました";
                setTimeout(() => $("btnCopy").textContent = "台本をコピー", 900);
            } catch (e) {
                // fallback
                const ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                ta.remove();
                $("btnCopy").textContent = "コピーしました";
                setTimeout(() => $("btnCopy").textContent = "台本をコピー", 900);
            }
        }

        // ====== イベント ======
        $("btnPick").addEventListener("click", () => {
            const t = pickOne();
            if (!t) {
                alert("条件に合うトリビアがありません。学年またはカテゴリを変えてください。");
                return;
            }
            renderTrivia(t);
        });

        $("btnShort").addEventListener("click", () => {
            isShort = !isShort;
            $("btnShort").textContent = isShort ? "通常モード" : "短縮モード";
            if (current) renderTrivia(current);
        });

        $("btnShowAnswer").addEventListener("click", () => {
            $("answerBtnRow").style.display = "none";
            $("tAnswer").style.display = "block";
        });

        $("btnFav").addEventListener("click", toggleFav);
        $("btnCopy").addEventListener("click", copyScript);

        $("btnClearFav").addEventListener("click", () => {
            storage.setFav([]);
            renderFav();
        });

        $("btnClearHistory").addEventListener("click", () => {
            storage.setHist([]);
            renderHistory();
        });

        $("favList").addEventListener("click", (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;
            const act = btn.dataset.act;
            const key = btn.dataset.key;
            if (!act || !key) return;

            if (act === "showFav") {
                const t = findByKey(key);
                if (t) renderTrivia(t);
            }
            if (act === "delFav") {
                const fav = storage.getFav().filter(x => x.key !== key);
                storage.setFav(fav);
                renderFav();
                if (current && triviaKey(current) === key) {
                    $("btnFav").textContent = "☆ お気に入り";
                }
            }
        });

        $("historyList").addEventListener("click", (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;
            const act = btn.dataset.act;
            const key = btn.dataset.key;
            if (act !== "showHist") return;
            const t = findByKey(key);
            if (t) renderTrivia(t);
        });

        $("grade").addEventListener("change", () => {
            // 今日固定ONの時は、条件変更で内容が変わるので表示更新したい場合は押し直しでOK
        });
        $("category").addEventListener("change", () => { });

        // ====== 初期化 ======
        function init() {
            $("countPill").textContent = `データ: ${TRIVIA.length}件`;
            renderFav();
            renderHistory();
            // 起動時に1件出す（好みでOFFでもOK）
            const t = pickOne();
            if (t) renderTrivia(t);
        }
        init();
    </script>

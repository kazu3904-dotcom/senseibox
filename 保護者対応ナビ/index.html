<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師を救うAIシリーズ・保護者対応ナビ</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (UI構築用) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel (ブラウザでJSXを動かす用) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome (アイコン用) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f0f4f8; 
            color: #334155;
        }
        
        /* アニメーション定義 */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* 入力エリアのフォーカスリング調整 */
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- 定数・データ定義 ---

        const URGENCY_CHECKS = [
            { id: 'danger', label: '身体の危険（怪我・事故・自傷他害の恐れ）', level: 'red' },
            { id: 'lawyer', label: '保護者の強い怒り・威圧・弁護士/警察への言及', level: 'red' },
            { id: 'harassment', label: 'ハラスメント（教員への中傷、過度な要求）', level: 'red' },
            { id: 'responsibility', label: '学校の責任追及（謝罪要求、賠償示唆）', level: 'red' },
            { id: 'bullying', label: 'いじめ・暴力・重大な人権侵害の疑い', level: 'yellow' },
            { id: 'sns', label: 'SNS/ネットトラブル（拡散の危険）', level: 'yellow' },
            { id: 'truancy', label: '不登校傾向（連続欠席・長期欠席）', level: 'yellow' },
            { id: 'other', label: 'その他（違和感・予兆あり）', level: 'yellow' },
        ];

        const CATEGORIES = {
            elementary: [
                '友人関係（けんか/仲間外れ）', 'けが・事故', '学習の不安', '生活面（忘れ物等）', 
                '指導への不満', '連絡の行き違い', 'クレーム傾向'
            ],
            junior_high: [
                'SNS/ネットトラブル', 'いじめ疑い/暴力', '不登校/欠席増', '進路・成績・評価', 
                '部活動', '校則・生活指導', '指導への苦情', 'クレーム傾向'
            ]
        };

        const SITUATION_OPTIONS = {
            timing: ['今日', '今週', '先週', '継続案件'],
            method: ['電話', '面談', '連絡帳', 'メール', 'アプリ', '来校'],
            emotion: ['相談(冷静)', '不安', '不満', '怒り', '威圧'],
            done: ['未対応', '聞き取り済', '学年共有済', '管理職共有済'],
            record: ['あり', 'なし']
        };

        // --- ユーティリティ関数 ---

        // クリップボードコピー機能
        const copyToClipboard = (text) => {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                return true;
            } catch (err) {
                console.error('Copy failed', err);
                return false;
            } finally {
                document.body.removeChild(textarea);
            }
        };

        // --- コンポーネント (再レンダリング対策のためApp外に定義) ---

        const CopyBtn = ({ text }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = () => {
                if (copyToClipboard(text)) {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };
            return (
                <button 
                    onClick={handleCopy}
                    className={`ml-auto border text-xs font-medium px-3 py-1.5 rounded transition duration-200 flex items-center ${
                        copied 
                            ? 'bg-emerald-50 text-emerald-600 border-emerald-200' 
                            : 'bg-white text-slate-500 border-slate-300 hover:bg-slate-50 hover:text-slate-700'
                    }`}
                >
                    <i className={`fas ${copied ? 'fa-check' : 'fa-copy'} mr-1.5`}></i>
                    {copied ? '完了' : 'コピー'}
                </button>
            );
        };

        // 入力ウィザードコンポーネント
        const StepWizard = ({ 
            step, 
            setStep, 
            data, 
            handleUpdate, 
            handleSituationUpdate, 
            handleDetailChange,
            toggleUrgency,
            urgencyLevel,
            generateResponse
        }) => {
            return (
                <div className="w-full max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden my-4 md:my-8 border border-slate-200">
                    {/* プログレスバー */}
                    <div className="bg-slate-50 p-4 border-b border-slate-100 flex items-center justify-between text-xs md:text-sm text-slate-400">
                        {[1, 2, 3, 4, 5].map(i => (
                            <div key={i} className={`flex items-center ${step >= i ? 'text-blue-600 font-bold' : ''}`}>
                                <div className={`w-7 h-7 rounded-full flex items-center justify-center mr-2 transition-colors ${step >= i ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-500'}`}>
                                    {i}
                                </div>
                                <span className="hidden md:inline">
                                    {i===1?'校種':i===2?'緊急度':i===3?'カテゴリ':i===4?'状況':i===5?'確認':''}
                                </span>
                            </div>
                        ))}
                    </div>

                    <div className="p-4 md:p-8 min-h-[400px]">
                        {/* Step 1: 学校種 */}
                        {step === 1 && (
                            <div className="fade-in space-y-8 text-center pt-4">
                                <h2 className="text-2xl font-bold text-slate-700">学校種を選択してください</h2>
                                <div className="grid grid-cols-2 gap-6 max-w-md mx-auto">
                                    <button 
                                        onClick={() => { handleUpdate('schoolType', 'elementary'); setStep(2); }}
                                        className="group p-8 border-2 border-slate-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition flex flex-col items-center bg-white"
                                    >
                                        <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-4 group-hover:bg-blue-200 transition">
                                            <i className="fas fa-child text-3xl text-blue-500"></i>
                                        </div>
                                        <span className="font-bold text-lg text-slate-700 group-hover:text-blue-700">小学校</span>
                                    </button>
                                    <button 
                                        onClick={() => { handleUpdate('schoolType', 'junior_high'); setStep(2); }}
                                        className="group p-8 border-2 border-slate-200 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 transition flex flex-col items-center bg-white"
                                    >
                                        <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mb-4 group-hover:bg-indigo-200 transition">
                                            <i className="fas fa-user-graduate text-3xl text-indigo-500"></i>
                                        </div>
                                        <span className="font-bold text-lg text-slate-700 group-hover:text-indigo-700">中学校</span>
                                    </button>
                                </div>
                                <div className="mt-10 text-sm text-slate-500 bg-slate-50 p-4 rounded-lg text-left max-w-md mx-auto border border-slate-100">
                                    <p className="font-bold mb-1 text-slate-600"><i className="fas fa-info-circle mr-1"></i> セキュリティについて</p>
                                    <p>このツールはブラウザ上で動作し、入力内容が外部サーバーに送信されることはありません。安心してお使いください。</p>
                                </div>
                            </div>
                        )}

                        {/* Step 2: 緊急度チェック */}
                        {step === 2 && (
                            <div className="fade-in">
                                <h2 className="text-xl font-bold text-slate-700 mb-6">緊急度チェック（該当するもの全て）</h2>
                                <div className="space-y-3">
                                    {URGENCY_CHECKS.map(check => (
                                        <label key={check.id} className={`flex items-center p-4 rounded-lg border cursor-pointer transition ${data.urgencyList.includes(check.id) ? 'bg-red-50 border-red-300 shadow-sm' : 'bg-white hover:bg-slate-50 border-slate-200'}`}>
                                            <input 
                                                type="checkbox" 
                                                checked={data.urgencyList.includes(check.id)} 
                                                onChange={() => toggleUrgency(check.id)}
                                                className="w-5 h-5 text-blue-600 rounded focus:ring-blue-500 mr-4" 
                                            />
                                            <span className={`${check.level === 'red' ? 'text-red-700 font-bold' : 'text-slate-700 font-medium'}`}>
                                                {check.label} {check.level === 'red' && <span className="ml-2 text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full border border-red-200">重要</span>}
                                            </span>
                                        </label>
                                    ))}
                                </div>
                                <div className={`mt-8 p-5 rounded-lg flex items-start ${urgencyLevel === 'red' ? 'bg-red-50 text-red-800 border-l-4 border-red-500' : (urgencyLevel === 'yellow' ? 'bg-yellow-50 text-yellow-800 border-l-4 border-yellow-400' : 'bg-emerald-50 text-emerald-800 border-l-4 border-emerald-400')}`}>
                                    <div className="text-3xl mr-4 mt-1">
                                        {urgencyLevel === 'red' ? <i className="fas fa-exclamation-triangle"></i> : (urgencyLevel === 'yellow' ? <i className="fas fa-exclamation-circle"></i> : <i className="fas fa-check-circle"></i>)}
                                    </div>
                                    <div>
                                        <div className="font-bold text-lg mb-1">
                                            現在の判定：
                                            {urgencyLevel === 'red' ? '管理職へ即共有（単独対応禁止）' : (urgencyLevel === 'yellow' ? '早期共有（当日中目安）' : '通常対応（記録必須）')}
                                        </div>
                                        <div className="text-sm opacity-90 leading-relaxed">
                                            {urgencyLevel === 'red' ? '法的リスクや身体の危険がある可能性があります。一人で抱え込まず、必ず組織で対応してください。' : '初期対応のミスがこじれる原因になります。慎重に進めましょう。'}
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-8 flex justify-between">
                                    <button onClick={() => setStep(1)} className="text-slate-500 hover:text-slate-700 px-4 py-2 font-medium">戻る</button>
                                    <button onClick={() => setStep(3)} className="bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 shadow-md font-bold transition">次へ</button>
                                </div>
                            </div>
                        )}

                        {/* Step 3: カテゴリ */}
                        {step === 3 && (
                            <div className="fade-in">
                                <h2 className="text-xl font-bold text-slate-700 mb-6">相談カテゴリを選択</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {CATEGORIES[data.schoolType].map(cat => (
                                        <button 
                                            key={cat} 
                                            onClick={() => { handleUpdate('category', cat); setStep(4); }}
                                            className={`p-5 text-left border rounded-lg transition-all ${data.category === cat ? 'bg-blue-50 border-blue-500 ring-1 ring-blue-500 shadow-md' : 'bg-white border-slate-200 hover:border-blue-400 hover:shadow-sm'}`}
                                        >
                                            <div className="font-bold text-slate-700">{cat}</div>
                                        </button>
                                    ))}
                                </div>
                                <div className="mt-8 flex justify-between">
                                    <button onClick={() => setStep(2)} className="text-slate-500 hover:text-slate-700 px-4 py-2 font-medium">戻る</button>
                                </div>
                            </div>
                        )}

                        {/* Step 4: 状況詳細 */}
                        {step === 4 && (
                            <div className="fade-in">
                                <h2 className="text-xl font-bold text-slate-700 mb-6">状況の詳細</h2>
                                
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-6 mb-6">
                                    {[
                                        { label: '発生タイミング', key: 'timing', options: SITUATION_OPTIONS.timing },
                                        { label: '連絡手段', key: 'method', options: SITUATION_OPTIONS.method },
                                        { label: '相手の温度感', key: 'emotion', options: SITUATION_OPTIONS.emotion },
                                        { label: 'すでに行ったこと', key: 'done', options: SITUATION_OPTIONS.done },
                                        { label: '記録の有無', key: 'record', options: SITUATION_OPTIONS.record },
                                    ].map((field) => (
                                        <div key={field.key}>
                                            <label className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">{field.label}</label>
                                            <div className="relative">
                                                <select 
                                                    value={data.situation[field.key]} 
                                                    onChange={(e) => handleSituationUpdate(field.key, e.target.value)} 
                                                    className="w-full border border-slate-300 rounded-lg p-2.5 bg-white appearance-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-700"
                                                >
                                                    {field.options.map(o => <option key={o} value={o}>{o}</option>)}
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500">
                                                    <i className="fas fa-chevron-down text-xs"></i>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mb-2">
                                    <label htmlFor="detail-input" className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">詳細（概要のみ）</label>
                                    <textarea 
                                        id="detail-input"
                                        value={data.situation.detail}
                                        onChange={handleDetailChange}
                                        placeholder="例：児童Aが児童Bに対して悪口を言ったとの訴え。保護者は「学校の対応が遅い」と言っている。"
                                        className="w-full border border-slate-300 rounded-lg p-4 h-32 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none resize-none text-slate-700 bg-white"
                                    ></textarea>
                                    <p className="text-xs text-rose-500 mt-2 flex items-center">
                                        <i className="fas fa-shield-alt mr-1"></i> 
                                        セキュリティ保護のため、個人情報（氏名、住所、電話番号等）は絶対に入力しないでください。
                                    </p>
                                </div>

                                <div className="mt-8 flex justify-between">
                                    <button onClick={() => setStep(3)} className="text-slate-500 hover:text-slate-700 px-4 py-2 font-medium">戻る</button>
                                    <button onClick={() => setStep(5)} className="bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 shadow-md font-bold transition">次へ</button>
                                </div>
                            </div>
                        )}

                        {/* Step 5: トーン選択・確認 */}
                        {step === 5 && (
                            <div className="fade-in">
                                <h2 className="text-xl font-bold text-slate-700 mb-6">出力トーンの選択</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                                    {['丁寧・標準（推奨）', 'かなり柔らかめ', '事務的'].map(tone => (
                                        <button 
                                            key={tone}
                                            onClick={() => handleUpdate('tone', tone)}
                                            className={`p-4 border rounded-lg text-center transition font-medium ${data.tone === tone ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                                        >
                                            {tone}
                                        </button>
                                    ))}
                                </div>

                                <div className="bg-slate-50 p-6 rounded-xl mb-8 border border-slate-100">
                                    <h3 className="font-bold text-slate-700 mb-4 border-b border-slate-200 pb-2">設定内容の確認</h3>
                                    <div className="space-y-2 text-sm text-slate-600">
                                        <div className="flex justify-between">
                                            <span>校種：</span>
                                            <span className="font-medium">{data.schoolType === 'elementary' ? '小学校' : '中学校'}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span>緊急度：</span>
                                            <span className={`font-bold ${urgencyLevel === 'red' ? 'text-red-600' : urgencyLevel === 'yellow' ? 'text-yellow-600' : 'text-emerald-600'}`}>
                                                {urgencyLevel === 'red' ? '赤（要管理職）' : urgencyLevel === 'yellow' ? '黄（要注意）' : '緑（通常）'}
                                            </span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span>カテゴリ：</span>
                                            <span className="font-medium">{data.category}</span>
                                        </div>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => { generateResponse(); }}
                                    className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl hover:from-blue-700 hover:to-indigo-700 transition transform hover:-translate-y-0.5 flex items-center justify-center text-lg"
                                >
                                    <i className="fas fa-wand-magic-sparkles mr-2"></i> 対応案を作成する
                                </button>
                                <div className="mt-6 text-center">
                                    <button onClick={() => setStep(4)} className="text-slate-400 hover:text-slate-600 text-sm underline">条件を修正する</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 結果表示用コンポーネント
        const ResultView = ({ result, resetApp, generateResponse }) => {
            return (
                <div className="w-full max-w-4xl mx-auto space-y-8 pb-12 fade-in">
                    {/* アラートバナー */}
                    {result.urgency === 'red' && (
                        <div className="bg-red-50 border-l-4 border-red-500 p-6 rounded-lg shadow-sm animate-pulse-slow">
                            <h3 className="text-red-800 font-bold flex items-center text-lg">
                                <i className="fas fa-exclamation-triangle mr-3"></i> 緊急度：赤（管理職対応推奨）
                            </h3>
                            <p className="text-red-700 mt-2 leading-relaxed">
                                この案件は単独で判断せず、直ちに管理職に報告してください。法的な判断や医療的な断定は避け、「組織としての対応」を徹底してください。
                            </p>
                        </div>
                    )}

                    {/* A. 初動の結論 */}
                    <section className="bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
                        <div className="bg-slate-800 px-6 py-4 flex items-center justify-between">
                            <h3 className="font-bold text-white"><span className="text-blue-300 mr-2">A.</span> 初動の結論（最重要）</h3>
                        </div>
                        <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-6">
                                <div>
                                    <span className="text-xs font-bold text-slate-400 block mb-2 uppercase">今すぐ言ってよい一言</span>
                                    <div className="bg-blue-50 text-blue-900 p-4 rounded-lg font-bold border border-blue-100 shadow-sm relative">
                                        <i className="fas fa-quote-left text-blue-200 absolute top-2 left-2 text-xl"></i>
                                        <p className="relative z-10 pl-4">"{result.conclusion.immediate}"</p>
                                    </div>
                                </div>
                                <div>
                                    <span className="text-xs font-bold text-slate-400 block mb-2 uppercase">持ち帰るべき一言</span>
                                    <div className="bg-slate-50 text-slate-700 p-4 rounded-lg border border-slate-200 shadow-sm">
                                        "{result.conclusion.takeHome}"
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-6">
                                <div>
                                    <span className="text-xs font-bold text-slate-400 block mb-2 uppercase">単独対応の可否</span>
                                    <div className={`p-4 rounded-lg font-bold border flex items-center ${result.urgency === 'red' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-emerald-50 text-emerald-700 border-emerald-100'}`}>
                                        <i className={`fas ${result.urgency === 'red' ? 'fa-ban' : 'fa-check'} mr-3 text-xl`}></i>
                                        {result.conclusion.solo}
                                    </div>
                                </div>
                                <div>
                                    <span className="text-xs font-bold text-slate-400 block mb-2 uppercase">推奨共有先</span>
                                    <div className="text-slate-700 p-4 bg-white border border-slate-200 rounded-lg">
                                        <i className="fas fa-users text-slate-400 mr-2"></i>{result.conclusion.share}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* B. 5ステップフロー */}
                        <section className="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                            <h3 className="font-bold text-slate-700 mb-5 flex items-center border-b pb-3">
                                <span className="bg-blue-100 text-blue-600 w-8 h-8 rounded-full flex items-center justify-center mr-3 text-sm">B</span>
                                5ステップ対応フロー
                            </h3>
                            <ul className="space-y-4">
                                {result.flow.map((step, i) => (
                                    <li key={i} className="flex items-start text-sm text-slate-700">
                                        <span className="font-bold text-slate-300 text-lg mr-3 mt-[-2px]">0{i+1}</span>
                                        <span className="leading-relaxed">{step}</span>
                                    </li>
                                ))}
                            </ul>
                        </section>

                        {/* C. NG表現 */}
                        <section className="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                            <h3 className="font-bold text-slate-700 mb-5 flex items-center border-b pb-3">
                                <span className="bg-red-100 text-red-600 w-8 h-8 rounded-full flex items-center justify-center mr-3 text-sm">C</span>
                                避けるべきNG表現
                            </h3>
                            <ul className="space-y-3">
                                {result.ngPhrases.map((ng, i) => (
                                    <li key={i} className="flex items-start text-sm text-slate-600 bg-red-50 p-3 rounded border border-red-100">
                                        <i className="fas fa-times-circle text-red-400 mr-2 mt-1 flex-shrink-0"></i>
                                        <span>{ng}</span>
                                    </li>
                                ))}
                            </ul>
                        </section>
                    </div>

                    {/* D. トーク例 */}
                    <section className="bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
                        <div className="bg-indigo-50 px-6 py-4 border-b border-indigo-100 flex justify-between items-center">
                            <h3 className="font-bold text-indigo-900"><span className="text-indigo-400 mr-2">D.</span> そのまま使えるトークスクリプト</h3>
                        </div>
                        <div className="p-6 space-y-8">
                            <div>
                                <div className="flex items-center mb-2">
                                    <div className="w-1 h-4 bg-indigo-400 mr-2 rounded"></div>
                                    <span className="text-sm font-bold text-slate-500">電話冒頭（20-40秒）</span>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-lg text-slate-700 leading-relaxed border border-slate-100">
                                    「{result.script.opening}」
                                </div>
                            </div>
                            <div>
                                <div className="flex items-center mb-2">
                                    <div className="w-1 h-4 bg-indigo-400 mr-2 rounded"></div>
                                    <span className="text-sm font-bold text-slate-500">事実確認の質問例</span>
                                </div>
                                <ul className="list-disc list-inside bg-slate-50 p-5 rounded-lg text-slate-700 space-y-2 border border-slate-100">
                                    {result.script.questions.map((q, i) => <li key={i}>{q}</li>)}
                                </ul>
                            </div>
                            <div>
                                <div className="flex items-center mb-2">
                                    <div className="w-1 h-4 bg-indigo-400 mr-2 rounded"></div>
                                    <span className="text-sm font-bold text-slate-500">クロージング（持ち帰り）</span>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-lg text-slate-700 leading-relaxed border border-slate-100">
                                    「{result.script.closing}」
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* G. 管理職要約 & F. 記録 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <section className="bg-white rounded-xl shadow-md p-6 border border-slate-200 flex flex-col">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-bold text-slate-700 flex items-center">
                                    <i className="fas fa-file-contract text-emerald-500 mr-2"></i> G. 管理職報告要約
                                </h3>
                                <CopyBtn text={result.manager.text} />
                            </div>
                            <textarea readOnly className="flex-1 w-full min-h-[200px] p-4 text-sm bg-slate-50 border border-slate-200 rounded-lg text-slate-700 font-mono resize-none focus:bg-white transition" value={result.manager.text}></textarea>
                            <p className="text-xs text-slate-400 mt-2 text-right">※チャットやメモでの第一報に</p>
                        </section>

                        <section className="bg-white rounded-xl shadow-md p-6 border border-slate-200 flex flex-col">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-bold text-slate-700 flex items-center">
                                    <i className="fas fa-feather-alt text-purple-500 mr-2"></i> F. 校内記録用メモ
                                </h3>
                                <CopyBtn text={result.record.text} />
                            </div>
                            <textarea readOnly className="flex-1 w-full min-h-[200px] p-4 text-sm bg-slate-50 border border-slate-200 rounded-lg text-slate-700 font-mono resize-none focus:bg-white transition" value={result.record.text}></textarea>
                        </section>
                    </div>
                    
                        {/* E. 連絡用文面 */}
                        <section className="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-slate-700 flex items-center">
                                <i className="fas fa-envelope text-blue-500 mr-2"></i> E. 保護者向け連絡文面
                            </h3>
                            <CopyBtn text={result.template.content} />
                        </div>
                        <textarea readOnly className="w-full h-64 p-4 text-sm bg-slate-50 border border-slate-200 rounded-lg text-slate-700 font-mono resize-none focus:bg-white transition" value={result.template.content}></textarea>
                    </section>

                    <div className="text-center pt-8 pb-12 space-x-4">
                        <button onClick={() => { generateResponse(); window.scrollTo(0, 0); }} className="px-6 py-3 border border-slate-300 text-slate-600 bg-white rounded-lg hover:bg-slate-50 transition font-medium">
                            <i className="fas fa-sync mr-2"></i>同じ条件で再生成
                        </button>
                        <button onClick={resetApp} className="px-6 py-3 bg-slate-700 text-white rounded-lg hover:bg-slate-800 transition font-medium shadow-sm">
                            <i className="fas fa-home mr-2"></i>最初に戻る
                        </button>
                    </div>
                </div>
            );
        };


        function App() {
            const [step, setStep] = useState(1);
            const [data, setData] = useState({
                schoolType: '',
                urgencyList: [],
                category: '',
                situation: {
                    timing: '今日',
                    method: '電話',
                    emotion: '相談(冷静)',
                    done: '未対応',
                    record: 'なし',
                    detail: ''
                },
                tone: '標準'
            });
            const [result, setResult] = useState(null);

            // 緊急度判定ロジック
            const urgencyLevel = useMemo(() => {
                if (data.urgencyList.some(id => URGENCY_CHECKS.find(u => u.id === id)?.level === 'red')) return 'red';
                if (data.urgencyList.length > 0) return 'yellow';
                return 'green';
            }, [data.urgencyList]);

            const handleUpdate = useCallback((field, value) => {
                setData(prev => ({ ...prev, [field]: value }));
            }, []);

            const handleSituationUpdate = useCallback((field, value) => {
                setData(prev => ({ ...prev, situation: { ...prev.situation, [field]: value } }));
            }, []);

            const handleDetailChange = useCallback((e) => {
                const newValue = e.target.value;
                setData(prev => ({
                    ...prev,
                    situation: {
                        ...prev.situation,
                        detail: newValue
                    }
                }));
            }, []);

            const toggleUrgency = useCallback((id) => {
                setData(prev => {
                    const list = prev.urgencyList.includes(id) 
                        ? prev.urgencyList.filter(item => item !== id)
                        : [...prev.urgencyList, id];
                    return { ...prev, urgencyList: list };
                });
            }, []);

            const loadTestData = useCallback((type) => {
                if (type === 'elem') {
                    setData({
                        schoolType: 'elementary',
                        urgencyList: [],
                        category: '友人関係（けんか/仲間外れ）',
                        situation: { timing: '今日', method: '電話', emotion: '不安', done: '未対応', record: 'なし', detail: 'AさんがBさんに仲間外れにされていると訴えている。本人は学校に行きたくないと言っている様子。' },
                        tone: 'かなり柔らかめ'
                    });
                    setStep(5);
                } else if (type === 'jh_sns') {
                    setData({
                        schoolType: 'junior_high',
                        urgencyList: ['sns', 'lawyer'],
                        category: 'SNS/ネットトラブル',
                        situation: { timing: '昨日', method: '面談', emotion: '怒り', done: '聞き取り済', record: 'あり', detail: 'SNSで実名を挙げて悪口を書かれた。相手の親を呼べと要求されている。警察に行くとも言っている。' },
                        tone: '事務的'
                    });
                    setStep(5);
                }
            }, []);

            const generateResponse = useCallback(() => {
                // 1. 安全フィルター
                let safeDetail = (data.situation.detail || '')
                    .replace(/必ず/g, "可能な範囲で")
                    .replace(/絶対/g, "原則として")
                    .replace(/確実に/g, "できるだけ早く")
                    .replace(/[〇◯]田|[〇◯]山/g, "相手生徒") 
                    .replace(/(?<![児童生徒保護者教員])([A-ZＡ-Ｚa-zａ-ｚ]さん|[A-ZＡ-Ｚa-zａ-ｚ]君)/g, "当該児童生徒");

                // 2. 出力データの構築
                const isRed = urgencyLevel === 'red';
                const isYellow = urgencyLevel === 'yellow';
                
                let output = {
                    urgency: urgencyLevel,
                    conclusion: {},
                    flow: [],
                    ngPhrases: [],
                    script: {},
                    template: {},
                    record: {},
                    manager: {}
                };

                output.conclusion = {
                    immediate: isRed 
                        ? "大変申し訳ありませんが、私個人の一存では判断しかねますので、直ちに管理職と協議し、確認して折り返します。" 
                        : "ご心配をおかけしております。詳細を確認させてください。",
                    takeHome: "事実関係と今後の対応について、学年・管理職と協議の上、改めてご連絡します。",
                    solo: isRed 
                        ? "不可（必ず管理職へ交代または同席）" 
                        : (isYellow ? "注意（報告必須）" : "可（記録は必須）"),
                    share: isRed 
                        ? "管理職（校長・教頭）、生徒指導主事" 
                        : "学年主任、担任団"
                };

                output.flow = [
                    "【受け止め】保護者の感情（不安・怒り）を否定せず、「お気持ちは受け止めました」と伝える。",
                    "【事実確認】いつ、どこで、誰が、何を、どうしたかを5W1Hで整理する（こちらの主観や推測は入れない）。",
                    "【保留】その場での「即答」や「約束」は避ける。「学校として確認します」と伝え、一旦電話を切る/面談を終える。",
                    "【校内共有】管理職・学年主任へ報告。対応方針（誰が、いつ、どう答えるか）を決定する。",
                    "【回答】決定した方針に基づき、事実と対応策（できること・できないこと）を伝える。"
                ];

                output.ngPhrases = [
                    "「絶対に解決します」（実現不可能な約束はしない）",
                    "「相手の親に謝らせます」（強要・個人情報漏洩のリスク）",
                    "「それは〇〇先生のミスですね」（同僚批判・責任の即断は避ける）",
                    "「様子を見ましょう」（放置と取られる可能性があるため、見守る具体策を添える）",
                    "「あなたのお子さんにも原因が…」（責任転嫁と取られる初期発言は厳禁）"
                ];

                const tonePrefix = data.tone === 'かなり柔らかめ' ? "この度は大変ご心配をおかけしております。" : "お電話ありがとうございます。";
                
                output.script = {
                    opening: `${tonePrefix}${data.schoolType === 'elementary' ? '担任の' : ''}[教員名]です。この度はお忙しいところご連絡いただきありがとうございます。大切なお話ですので、メモを取らせていただきますね。`,
                    questions: [
                        "その出来事は、いつ頃のことか分かりますでしょうか？",
                        "お子様はご帰宅後、どのようなご様子でしたか？",
                        "保護者様として、特にご心配されている点はどのあたりでしょうか？",
                        "（事実確認のため）その際、周りに他のお子さんや先生はおりましたでしょうか？"
                    ],
                    closing: isRed 
                        ? "大変重要なお話ですので、私個人の判断ではなく、管理職に報告の上、学校として責任を持って対応検討いたします。確認して、本日中に（または明日）こちらから折り返します。"
                        : "お話を聞かせていただきありがとうございます。事実関係を確認し、学校としてどう対応できるか相談した上で、改めてご連絡差し上げます。"
                };

                const baseTemplate = `
件名：【ご連絡】[件名概要]について

[保護者名] 様

いつも大変お世話になっております。
[学校名]の[教員名]です。

先ほどは（ご連絡/面談のお時間を）いただき、ありがとうございました。
いただいたご相談内容につきまして、
学年（および管理職）にて共有し、事実確認を進めております。

[お子様名]さんが安心して学校生活を送れるよう、
学校としてもしっかりと見守り、対応してまいります。

確認ができ次第、改めてご報告・ご相談のご連絡を差し上げます。
取り急ぎ、受領のご連絡まで申し上げます。

--------------------------------------------------
[学校名]
[教員名]
--------------------------------------------------
                `;
                output.template = { content: baseTemplate.trim() };

                output.record = {
                    text: `
■日時：${new Date().toLocaleDateString()} ${new Date().getHours()}:${new Date().getMinutes().toString().padStart(2, '0')}
■相手：[保護者名]（[児童生徒名]）
■手段：${data.situation.method}
■案件：${data.category} / 温度感：${data.situation.emotion}

■内容（要約）：
${safeDetail}

■保護者の要望：
（要望があれば記入）

■こちらの回答：
${output.conclusion.immediate}
（即答は避け、持ち帰りを伝えた）

■次アクション：
${output.conclusion.share}へ報告。事実確認後、${data.situation.timing === '今日' ? '本日中' : '明日以降'}に折り返し。
                    `.trim()
                };

                output.manager = {
                    text: `
【${urgencyLevel === 'red' ? '緊急' : '報告'}】保護者対応案件（${data.category}）
●緊急度：${urgencyLevel === 'red' ? '★赤（即対応必要）' : (urgencyLevel === 'yellow' ? '▲黄（注意）' : '・緑（報告）')}
●対象：[学年/クラス] [児童生徒名]
●状態：${data.situation.emotion} / ${data.situation.method}にて連絡あり
●争点：${safeDetail.substring(0, 50)}...
●初動：${data.situation.done}。「確認して折り返す」と伝達済。
●仰ぎたい判断：${isRed ? '法的リスク/重大事案の可能性あり。対応方針の指示をお願いします。' : '事実確認の進め方と、家庭への回答内容について。'}
                    `.trim()
                };

                setResult(output);
            }, [data, urgencyLevel]);

            const resetApp = useCallback(() => {
                setStep(1);
                setResult(null);
                setData(prev => ({...prev, urgencyList: [], situation: {...prev.situation, detail: ''}}));
                window.scrollTo(0, 0);
            }, []);

            return (
                <div className="min-h-screen pb-10">
                    {/* ヘッダー */}
                    <header className="bg-slate-800 text-white shadow-lg sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center">
                                <div className="w-8 h-8 bg-blue-500 rounded flex items-center justify-center mr-3 shadow-lg">
                                    <i className="fas fa-shield-alt text-white"></i>
                                </div>
                                <div>
                                    <h1 className="font-bold text-lg leading-tight">教師を救うAIシリーズ・保護者対応ナビ</h1>
                                    <p className="text-[10px] text-slate-300 hidden md:block opacity-80">教師を守る防具：判断支援＋記録作成ツール</p>
                                </div>
                            </div>
                            {step === 1 && (
                                <div className="text-xs flex gap-2">
                                    <button onClick={() => loadTestData('elem')} className="text-slate-300 hover:text-white border border-slate-600 px-3 py-1 rounded transition">小:テスト</button>
                                    <button onClick={() => loadTestData('jh_sns')} className="text-slate-300 hover:text-white border border-slate-600 px-3 py-1 rounded transition">中:テスト</button>
                                </div>
                            )}
                        </div>
                    </header>

                    {/* メインコンテンツ */}
                    <main className="p-4 md:p-6">
                        {result ? (
                            <ResultView 
                                result={result} 
                                resetApp={resetApp} 
                                generateResponse={generateResponse} 
                            />
                        ) : (
                            <StepWizard 
                                step={step} 
                                setStep={setStep} 
                                data={data} 
                                handleUpdate={handleUpdate} 
                                handleSituationUpdate={handleSituationUpdate}
                                handleDetailChange={handleDetailChange}
                                toggleUrgency={toggleUrgency}
                                urgencyLevel={urgencyLevel}
                                generateResponse={generateResponse}
                            />
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

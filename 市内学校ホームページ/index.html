<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市内学校ホームページ一覧</title>
    <meta name="description" content="西条市の小学校・中学校および教育関係機関のホームページ一覧です。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-glow: rgba(79, 70, 229, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.2) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
            line-height: 1.6;
            background-attachment: fixed;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 3rem;
            position: relative;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .search-input {
            width: 100%;
            padding: 1.25rem 3.5rem 1.25rem 1.5rem;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .search-input::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(129, 140, 248, 0.5);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .search-icon {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            stroke: var(--text-muted);
            pointer-events: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease-out both;
        }
        
        .card-content {
            flex: 1;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(255, 255, 255, 0.08), 
                transparent
            );
            transition: 0.5s;
        }

        .card:hover, .card:active {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(129, 140, 248, 0.4);
            box-shadow: 
                0 10px 30px -10px rgba(0, 0, 0, 0.5), 
                0 0 20px -5px var(--accent-glow);
            background: rgba(40, 53, 75, 0.8);
        }

        .card:hover::before {
            left: 100%;
        }

        .card-content h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .card-content p {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .icon {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover .icon {
            background: linear-gradient(135deg, #818cf8, #4f46e5);
            color: white;
            transform: rotate(-15deg) scale(1.1);
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        .icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .category-header {
            grid-column: 1 / -1;
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 0.75rem;
            color: #6ee7b7;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: fadeIn 0.6s ease-out both;
        }

        .category-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(110, 231, 183, 0.3), transparent);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            animation: fadeIn 0.4s ease-out;
        }

        @media (max-width: 640px) {
            body {
                padding: 1.5rem 0.75rem 3rem;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .card {
                padding: 1.25rem 1rem;
                border-radius: 16px;
            }
            .card-content h2 {
                font-size: 1.15rem;
            }
            h1 {
                font-size: 1.75rem;
            }
            p.subtitle {
                font-size: 1rem;
                padding: 0 1rem;
            }
            .search-input {
                font-size: 1rem;
                padding: 1rem 3rem 1rem 1.25rem;
            }
            .category-header {
                font-size: 1.15rem;
                margin-top: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>市内学校ホームページ一覧</h1>
            <p class="subtitle">タップして各学校・機関の公式サイトへアクセスできます</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="学校名や機関名を検索..." aria-label="検索">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>

        <div class="grid" id="schoolGrid">
            <!-- Cards populated here by JS -->
        </div>
    </div>

    <script>
        const records = [
            { name: "文部科学省", url: "https://www.mext.go.jp/", category: "教育機関・行政" },
            { name: "愛媛県教育委員会", url: "https://ehime-kyoiku.esnet.ed.jp/", category: "教育機関・行政" },
            { name: "愛媛県教育センター", url: "https://center.esnet.ed.jp/", category: "教育機関・行政" },
            { name: "西条市教育委員会事務局", url: "https://www.city.saijo.ehime.jp/soshiki/14.html", category: "教育機関・行政" },
            
            { name: "西条小学校", url: "https://ehm-saijo-e.esnet.ed.jp/", category: "小学校" },
            { name: "神拝小学校", url: "https://kanbai-e.esnet.ed.jp/", category: "小学校" },
            { name: "大町小学校", url: "https://ohmachi-e.esnet.ed.jp/", category: "小学校" },
            { name: "玉津小学校", url: "https://saijo-tamatsu-e.esnet.ed.jp/", category: "小学校" },
            { name: "飯岡小学校", url: "https://iioka-e.esnet.ed.jp/", category: "小学校" },
            { name: "神戸小学校", url: "https://saijo-kambe-e.esnet.ed.jp/", category: "小学校" },
            { name: "禎瑞小学校", url: "https://teizui-e.esnet.ed.jp/", category: "小学校" },
            { name: "橘小学校", url: "https://saijo-tachibana-e.esnet.ed.jp/", category: "小学校" },
            { name: "氷見小学校", url: "https://himi-e.esnet.ed.jp/", category: "小学校" },
            { name: "壬生川小学校", url: "https://nyugawa-e.esnet.ed.jp/", category: "小学校" },
            { name: "周布小学校", url: "https://shuu-e.esnet.ed.jp/", category: "小学校" },
            { name: "吉井小学校", url: "https://yoshii-e.esnet.ed.jp/", category: "小学校" },
            { name: "多賀小学校", url: "http://taga-e.esnet.ed.jp/", category: "小学校" },
            { name: "国安小学校", url: "https://kuniyasu-e.esnet.ed.jp/", category: "小学校" },
            { name: "吉岡小学校", url: "https://yoshioka-e.esnet.ed.jp/", category: "小学校" },
            { name: "三芳小学校", url: "https://saijo-miyoshi-e.esnet.ed.jp/", category: "小学校" },
            { name: "楠河小学校", url: "https://kusukawa-e.esnet.ed.jp/", category: "小学校" },
            { name: "庄内小学校", url: "https://shonai-e.esnet.ed.jp/", category: "小学校" },
            { name: "丹原小学校", url: "https://tanbara-e.esnet.ed.jp/", category: "小学校" },
            { name: "徳田小学校", url: "https://tokuda-e.esnet.ed.jp/", category: "小学校" },
            { name: "田滝小学校", url: "https://tataki-e.esnet.ed.jp/", category: "小学校" },
            { name: "田野小学校", url: "https://tano-e.esnet.ed.jp/", category: "小学校" },
            { name: "中川小学校", url: "https://saijo-nakagawa-e.esnet.ed.jp/", category: "小学校" },
            { name: "小松小学校", url: "https://komatsu-e.esnet.ed.jp/", category: "小学校" },
            { name: "石根小学校", url: "https://iwane-e.esnet.ed.jp/", category: "小学校" },
            
            { name: "西条東中学校", url: "https://saijo-higashi-j.esnet.ed.jp/", category: "中学校" },
            { name: "西条西中学校", url: "https://saijo-nishi-j.esnet.ed.jp/", category: "中学校" },
            { name: "西条南中学校", url: "https://saijo-minami-j.esnet.ed.jp/", category: "中学校" },
            { name: "西条北中学校", url: "https://saijo-kita-j.esnet.ed.jp/", category: "中学校" },
            { name: "東予東中学校", url: "https://toyohigashi-j.esnet.ed.jp/", category: "中学校" },
            { name: "東予西中学校", url: "https://toyonishi-j.esnet.ed.jp/", category: "中学校" },
            { name: "河北中学校", url: "https://kahoku-j.esnet.ed.jp/", category: "中学校" },
            { name: "丹原東中学校", url: "https://tambarahigashi-j.esnet.ed.jp/", category: "中学校" },
            { name: "丹原西中学校", url: "https://tambaranishi-j.esnet.ed.jp/", category: "中学校" },
            { name: "小松中学校", url: "https://komatsu-j.esnet.ed.jp/", category: "中学校" },
            
            { name: "ウイングサポートセンター", url: "https://www.city.saijo.ehime.jp/soshiki/gakkokyoiku/gk0051.html", category: "関連施設・システム" },
            { name: "西条市施設予約システム", url: "https://www.saijo.shisetsu-info.jp/User/UserMain.aspx", category: "関連施設・システム" }
        ];

        const grid = document.getElementById('schoolGrid');
        const searchInput = document.getElementById('searchInput');

        function renderCards(filterText = '') {
            grid.innerHTML = '';
            
            const lowerFilterStr = filterText.toLowerCase();
            const filteredRecords = records.filter(record => 
                record.name.toLowerCase().includes(lowerFilterStr)
            );

            if (filteredRecords.length === 0) {
                grid.innerHTML = '<div class="no-results">該当する学校・機関が見つかりませんでした。別のキーワードをお試しください。</div>';
                return;
            }

            let currentCategory = '';
            let animDelay = 0;

            filteredRecords.forEach(record => {
                if (record.category !== currentCategory) {
                    const header = document.createElement('div');
                    header.className = 'category-header';
                    header.textContent = record.category;
                    header.style.animationDelay = `${animDelay}s`;
                    grid.appendChild(header);
                    currentCategory = record.category;
                    animDelay += 0.05;
                }

                let urlDomain = '';
                try {
                    urlDomain = new URL(record.url).hostname;
                } catch(e) {
                    urlDomain = record.url;
                }

                const card = document.createElement('a');
                card.href = record.url;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                card.className = 'card';
                card.style.animationDelay = `${animDelay}s`;
                animDelay += 0.05;

                card.innerHTML = `
                    <div class="card-content">
                        <h2>${record.name}</h2>
                        <p>${urlDomain}</p>
                    </div>
                    <div class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                        </svg>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        renderCards();

        searchInput.addEventListener('input', (e) => {
            renderCards(e.target.value);
        });
    </script>
</body>
</html>

                    "ルールやマナーを守ることの大切さを理解し、集団生活の秩序を保つために正しく行動しました。",
                    "友達同士のトラブルの際にも、一方的な見方をせず、双方の言い分を聞いて公平に判断しようと努めました。",
                    "自分の非を認める潔さと、他者の正当な意見を受け入れる素直さを持ち合わせています。"
                ],
                g2: [
                    "集団の中での不公平や不正に対して、「おかしい」と言える勇気と正義感を持っています。",
                    "部活動の試合や練習において、公明正大な態度（フェアプレー精神）を貫き、相手チームにも敬意を払いました。",
                    "異なる立場や意見を持つ人とも対等に向き合い、合意形成を図る中で公正な視点を保つことができました。",
                    "個人の利益よりも全体の公平性を優先し、客観的な立場で物事を判断する力が育っています。"
                ],
                g3: [
                    "多様な価値観が存在する社会において、偏見や差別をなくし、公正な社会を築こうとする高い人権意識を持っています。",
                    "生徒総会などの議論の場において、少数意見にも耳を傾け、全員が納得できる公正な結論を導き出そうと尽力しました。",
                    "感情に流されることなく、事実に基づいて冷静かつ公正に判断し、リーダーとして信頼される行動をとりました。",
                    "社会正義に対する関心が高く、ニュースや社会問題についても公正な視点から自分の考えを持つことができました。"
                ]
            },
            "公共心・公徳心": {
                g1: [
                    "学校の備品や公共物を大切に扱い、次に使う人のことを考えて整理整頓を心がけました。",
                    "通学路のマナーや交通ルールを遵守し、地域の方々にも迷惑をかけないよう配慮した行動がとれました。",
                    "廊下歩行や集会時の私語を慎むなど、公の場でのマナーを守り、規律ある集団生活に協力しました。",
                    "SNSやインターネットの利用において、ルールやモラルを守り、適切な情報発信を心がけました。"
                ],
                g2: [
                    "校外学習や修学旅行において、公共の場でのマナーをわきまえ、学校の代表として恥ずかしくない行動がとれました。",
                    "社会の一員としての自覚が芽生え、公共の利益のために自分ができることを考え、行動に移すことができました。",
                    "公共施設を利用する際、譲り合いの精神を持ち、周囲の人々への配慮を忘れない態度は立派です。",
                    "集団のルールを守るだけでなく、守れていない人がいれば注意し合えるような、自治的な雰囲気を大切にしました。"
                ],
                g3: [
                    "社会のルールや法を遵守する遵法精神を持ち、良識ある市民としての資質が着実に育っています。",
                    "地域社会の伝統や文化を尊重し、地域の一員として行事や活動に協力しようとする意欲が見られました。",
                    "公共の福祉と個人の権利のバランスについて考え、社会全体の幸福に貢献しようとする高い公共心を持っています。",
                    "卒業を控え、愛校心を持って学校施設をきれいに使い、後輩たちにより良い環境を残そうと努めました。"
                ]
            }
        };

        // ----------------------------------------------------------------------
        // ヘルパー関数: 常体変換ロジック
        // ----------------------------------------------------------------------

        const convertToJoutai = (text) => {
            let converted = text;
            
            // 文末の置換ルール (順序が重要です)
            const rules = [
                // ユーザー要望対応 + 一般的な音便対応
                { pattern: /取り組みました/g, replace: '取り組めた' },
                { pattern: /楽しみました/g, replace: '楽しんだ' },
                { pattern: /味わいました/g, replace: '味わうことができた' },
                { pattern: /なりました/g, replace: 'なった' }, // 追加: 「なりた」を防ぐため

                // 一般的な変換
                { pattern: /ていました。/g, replace: 'ていた。' },
                { pattern: /てきました。/g, replace: 'てきた。' },
                { pattern: /できました。/g, replace: 'できた。' },
                { pattern: /ありました。/g, replace: 'あった。' },
                { pattern: /ました。/g, replace: 'た。' },
                { pattern: /ています。/g, replace: 'ている。' },
                { pattern: /ています/g, replace: 'ている' }, // 文中の接続
                { pattern: /います。/g, replace: 'いる。' },
                { pattern: /ありません。/g, replace: 'ない。' },
                { pattern: /ないです。/g, replace: 'ない。' },
                { pattern: /でしょう。/g, replace: 'だろう。' },
                { pattern: /ください。/g, replace: 'ほしい。' }, 
                
                // 形容詞 (「い」で終わる) + です -> 「い」で終わる
                { pattern: /([ぁ-んァ-ヶ]い)です。/g, replace: '$1。' },
                
                // 形容動詞・名詞 + でした -> であった
                { pattern: /([ぁ-んァ-ヶ])でした。/g, replace: '$1であった。' },
                
                // 形容動詞・名詞 + です -> である
                { pattern: /です。/g, replace: 'である。' },
                
                // 文中の接続助詞的な「〜ますが、」 -> 「〜るが、」など
                { pattern: /ますが、/g, replace: 'るが、' },
                { pattern: /ですが、/g, replace: 'だが、' },
            ];

            rules.forEach(rule => {
                converted = converted.replace(rule.pattern, rule.replace);
            });

            return converted;
        };

        const generateDrafts = (category, gradeRange, lengthType, styleMode) => {
            const templates = SHOKEN_DB[category]?.[gradeRange] || [];
            if (templates.length === 0) return ["データが見つかりません"];

            const shuffled = [...templates].sort(() => 0.5 - Math.random());
            
            const rawDrafts = [];

            // 案1: シンプル
            rawDrafts.push(shuffled[0]);

            // 案2: 連結または別案
            if (shuffled[1]) {
                if (lengthType === 'long') {
                    rawDrafts.push(`${shuffled[0]}また、${shuffled[1]}`);
                } else {
                    rawDrafts.push(shuffled[1]);
                }
            } else {
                rawDrafts.push(shuffled[0]); 
            }

            // 案3
            if (shuffled[2]) {
                if (lengthType === 'long' && shuffled[0] && shuffled[1]) {
                    rawDrafts.push(`${shuffled[2]}さらに、${shuffled[1]}`);
                } else {
                    rawDrafts.push(shuffled[2]);
                }
            } else {
                rawDrafts.push("中学生として大変立派な態度でした。");
            }

            // 文体変換
            return rawDrafts.map(text => {
                let processedText = text;
                if (styleMode === 'joutai') {
                    processedText = convertToJoutai(text);
                }
                return processedText;
            });
        };

        // ----------------------------------------------------------------------
        // メインコンポーネント
        // ----------------------------------------------------------------------

        function App() {
            const [selectedCategory, setSelectedCategory] = useState(CATEGORIES[0]);
            const [selectedGrade, setSelectedGrade] = useState("g1");
            const [selectedLength, setSelectedLength] = useState("medium");
            const [styleMode, setStyleMode] = useState("keigo"); 
            const [results, setResults] = useState([]);
            const [copiedIndex, setCopiedIndex] = useState(null);

            useEffect(() => {
                handleGenerate();
            }, []);

            const handleGenerate = () => {
                const drafts = generateDrafts(selectedCategory, selectedGrade, selectedLength, styleMode);
                setResults(drafts);
                setCopiedIndex(null);
            };

            const copyToClipboard = (text, index) => {
                navigator.clipboard.writeText(text);
                setCopiedIndex(index);
                setTimeout(() => setCopiedIndex(null), 2000);
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
                    {/* ヘッダー: 中学生向けにシックな色合いに変更 */}
                    <header className={`p-4 shadow-lg transition-colors ${styleMode === 'keigo' ? 'bg-slate-800' : 'bg-green-800'}`}>
                        <div className="max-w-4xl mx-auto flex items-center gap-3 text-white">
                            <BookOpen className="w-8 h-8" />
                            <div>
                                <h1 className="text-xl md:text-2xl font-bold tracking-wide">中学校 通知表・指導要録 「行動の記録」所見作成プロ</h1>
                                <p className="text-xs opacity-80 flex items-center gap-1">
                                    <Settings className="w-3 h-3" />
                                    モード: {styleMode === 'keigo' ? '通知表 (敬体)' : '指導要録 (常体)'}
                                </p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-6">
                        
                        {/* コントロールパネル */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
                            
                            {/* 文体切り替えタブ */}
                            <div className="mb-6 bg-slate-100 p-1.5 rounded-lg inline-flex w-full md:w-auto">
                                {STYLE_OPTIONS.map((option) => (
                                    <button
                                        key={option.id}
                                        onClick={() => setStyleMode(option.id)}
                                        className={`flex-1 md:flex-none px-6 py-2 rounded-md text-sm font-bold transition-all flex flex-col items-center ${
                                            styleMode === option.id
                                                ? 'bg-white text-slate-800 shadow-sm'
                                                : 'text-slate-500 hover:text-slate-700'
                                        }`}
                                    >
                                        <span>{option.label}</span>
                                        <span className="text-xs font-normal opacity-70 mt-0.5">{option.desc}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                
                                {/* 1. 観点選択 */}
                                <div className="space-y-2">
                                    <label className="text-sm font-semibold text-slate-500 uppercase tracking-wider flex items-center gap-1">
                                        <Sparkles className="w-4 h-4" /> 評価項目
                                    </label>
                                    <select 
                                        value={selectedCategory}
                                        onChange={(e) => setSelectedCategory(e.target.value)}
                                        className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-500 focus:border-slate-500 outline-none transition-all"
                                    >
                                        {CATEGORIES.map((cat) => (
                                            <option key={cat} value={cat}>{cat}</option>
                                        ))}
                                    </select>
                                </div>

                                {/* 2. 学年選択 */}
                                <div className="space-y-2">
                                    <label className="text-sm font-semibold text-slate-500 uppercase tracking-wider">
                                        対象学年
                                    </label>
                                    <div className="relative">
                                        <select 
                                            value={selectedGrade}
                                            onChange={(e) => setSelectedGrade(e.target.value)}
                                            className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-500 focus:border-slate-500 outline-none transition-all appearance-none"
                                        >
                                            {GRADE_RANGES.map((g) => (
                                                <option key={g.id} value={g.id}>{g.label}</option>
                                            ))}
                                        </select>
                                        <div className="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none">
                                            <svg className="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>

                                {/* 3. 文字数選択 */}
                                <div className="space-y-2">
                                    <label className="text-sm font-semibold text-slate-500 uppercase tracking-wider">
                                        文章量
                                    </label>
                                    <div className="flex bg-slate-100 p-1 rounded-lg">
                                        {LENGTH_OPTIONS.map((len) => (
                                            <button
                                                key={len.id}
                                                onClick={() => setSelectedLength(len.id)}
                                                className={`flex-1 py-1.5 text-sm font-medium rounded-md transition-all ${
                                                    selectedLength === len.id 
                                                        ? 'bg-white text-slate-800 shadow-sm' 
                                                        : 'text-slate-500 hover:text-slate-700'
                                                }`}
                                            >
                                                {len.label.split(' ')[0]}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                            </div>

                            {/* 生成ボタン */}
                            <div className="mt-6 flex justify-end">
                                <button
                                    onClick={handleGenerate}
                                    className={`flex items-center gap-2 text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform transform hover:-translate-y-0.5 active:translate-y-0 ${
                                        styleMode === 'keigo' ? 'bg-slate-700 hover:bg-slate-800' : 'bg-green-700 hover:text-green-800'
                                    }`}
                                >
                                    <PenTool className="w-5 h-5" />
                                    所見を作成する
                                </button>
                            </div>
                        </div>

                        {/* 結果表示エリア */}
                        <div className="space-y-4">
                            <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                <span className={`p-1 px-3 rounded text-white ${styleMode === 'keigo' ? 'bg-slate-600' : 'bg-green-700'}`}>
                                    {styleMode === 'keigo' ? '通知表モード' : '指導要録モード'}
                                </span>
                                <span className="text-sm font-normal text-slate-500 ml-auto">※ボタンを押してコピーできます</span>
                            </h2>

                            <div className="grid grid-cols-1 gap-4">
                                {results.map((text, index) => (
                                    <div 
                                        key={index} 
                                        className={`group relative bg-white border-l-4 rounded-r-lg shadow-sm hover:shadow-md transition-all p-5 ${
                                            styleMode === 'keigo' ? 'border-slate-600' : 'border-green-600'
                                        }`}
                                    >
                                        <div className="flex items-start gap-3">
                                            <FileText className={`w-5 h-5 mt-1 flex-shrink-0 ${styleMode === 'keigo' ? 'text-slate-500' : 'text-green-500'}`} />
                                            <p className="text-slate-800 leading-relaxed pr-10">
                                                {text}
                                            </p>
                                        </div>
                                        
                                        <button
                                            onClick={() => copyToClipboard(text, index)}
                                            className={`absolute top-4 right-4 p-2 rounded-full transition-colors ${
                                                copiedIndex === index 
                                                    ? 'bg-green-100 text-green-600' 
                                                    : 'bg-slate-100 text-slate-400 group-hover:bg-slate-200'
                                            }`}
                                            title="コピー"
                                        >
                                            {copiedIndex === index ? <Check className="w-5 h-5" /> : <Copy className="w-5 h-5" />}
                                        </button>
                                    </div>
                                ))}
                            </div>

                            {/* 再生成ボタン（下部） */}
                            <div className="flex justify-center mt-8">
                                <button
                                    onClick={handleGenerate}
                                    className={`flex items-center gap-2 font-medium transition-colors ${
                                        styleMode === 'keigo' ? 'text-slate-600 hover:text-slate-800' : 'text-green-700 hover:text-green-900'
                                    }`}
                                >
                                    <RefreshCw className="w-4 h-4" />
                                    別のパターンを生成する
                                </button>
                            </div>
                        </div>

                    </main>

                    <footer className="mt-12 bg-slate-100 py-6 border-t border-slate-200">
                        <div className="max-w-4xl mx-auto text-center text-slate-500 text-sm">
                            <p>参考資料: 学習指導要領・行動の記録の観点</p>
                            <p className="mt-2">※生成された文章は必ず確認・調整してご使用ください。</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF ⇔ JPEG 変換アプリ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- JSZip & FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- SortableJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF ⇄ JPEG Converter</h1>
            <p>ファイルをドラッグ＆ドロップするだけで、フォーマットを自動的に相互変換します。<br>すべてお使いのブラウザ上で処理されるため、データが外部に送信されることはなく安全です。</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <span class="icon">📄 ⇄ 🖼️</span>
                    <h2 id="drop-text">ここにファイルをドロップ</h2>
                    <p class="subtitle">PDFをドロップでJPEGに、JPEGをドロップでPDFに変換</p>
                    <input type="file" id="file-input" accept="application/pdf, image/jpeg, image/jpg, image/png" multiple hidden>
                    <button id="browse-btn" class="btn">またはファイルを選択</button>
                </div>
            </div>

            <div id="status-container" class="status-container hidden">
                <div class="loader"></div>
                <p id="status-message">処理中...</p>
            </div>
            
            <div id="result-container" class="result-container hidden">
                <h3>変換結果 <span style="font-size: 0.6em; font-weight: normal; color: var(--text-light); margin-left: 8px;">(ドラッグで順序を並び替えられます)</span></h3>
                <ul id="download-list"></ul>
                <div class="action-buttons" style="display: flex; justify-content: center; gap: 16px;">
                    <button id="download-all-btn" class="btn hidden" style="background: var(--success); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4);">📦 一括ダウンロード (.zip)</button>
                    <button id="merge-pdf-btn" class="btn hidden" style="background: #3b82f6; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);">📄 1つのPDFにまとめる</button>
                    <button id="reset-btn" class="btn outline">新しく変換する</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>


<div style="position:fixed; bottom:8px; right:12px; font-size:11px; color:rgba(255,255,255,0.5); pointer-events:none; z-index:9999;">
    © せんせい箱
</div>


</body>
</html>
